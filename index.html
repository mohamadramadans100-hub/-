  /**
   * حساب الوقت المتبقي للصلاة
   */
  function getTimeRemaining(prayerTime24) {
    if (!prayerTime24) return null;
    const now = new Date();
    const [hours, minutes] = prayerTime24.split(':').map(Number);
    const prayerDate = new Date(now);
    prayerDate.setHours(hours, minutes, 0, 0);

    let diff = prayerDate.getTime() - now.getTime();
    if (diff < 0) {
      prayerDate.setDate(prayerDate.getDate() + 1);
      diff = prayerDate.getTime() - now.getTime();
    }
    return diff;
  }

  /**
   * تنسيق الوقت المتبقي
   */
  function formatCountdown(ms) {
    if (ms <= 0) return '00:00:00';
    const totalSec = Math.floor(ms / 1000);
    const hours = String(Math.floor(totalSec / 3600)).padStart(2, '0');
    const minutes = String(Math.floor((totalSec % 3600) / 60)).padStart(2, '0');
    const seconds = String(totalSec % 60).padStart(2, '0');
    return `${hours}:${minutes}:${seconds}`;
  }

  /**
   * إيقاف الأذان لصلاة معينة
   */
  function stopAthanForPrayer(prayerKey) {
    if (audioPlayers[prayerKey]) {
      try {
        audioPlayers[prayerKey].pause();
        audioPlayers[prayerKey].currentTime = 0;
      } catch(e) {}
      audioPlayers[prayerKey] = null;
    }
    if (currentAthanPrayer === prayerKey) {
      currentAthanPrayer = null;
    }
    const playBtn = document.getElementById(`playBtn_${prayerKey}`);
    if (playBtn) {
      playBtn.classList.remove('playing');
      playBtn.innerHTML = '<i class="fas fa-play"></i>';
    }
    const statusEl = document.getElementById(`status_${prayerKey}`);
    if (statusEl) {
      statusEl.textContent = '⏹ متوقف';
      statusEl.className = 'athan-status-badge status-inactive';
    }
  }

  /**
   * تشغيل الأذان لصلاة معينة
   */
  function playAthanForPrayer(prayerKey) {
    if (currentAthanPrayer && currentAthanPrayer !== prayerKey) {
        stopAthanForPrayer(currentAthanPrayer);
    }

    if (currentAthanPrayer === prayerKey) {
        stopAthanForPrayer(prayerKey);
        return;
    }

    // جلب اختيار المؤذن لهذه الصلاة من localStorage
    const muadhinKey = localStorage.getItem(`muadhin_${prayerKey}`) || 'default';
    let fileName = MUADHIN_FILES[muadhinKey] || MUADHIN_FILES['default'];
    let audioPath = fileName;

    console.log('🔊 تشغيل الأذان:', audioPath, 'لصلاة:', prayerKey);

    const audio = new Audio(audioPath);
    audioPlayers[prayerKey] = audio;

    audio.play()
        .then(() => {
            console.log('✅ تم التشغيل بنجاح');
            currentAthanPrayer = prayerKey;

            const playBtn = document.getElementById(`playBtn_${prayerKey}`);
            if (playBtn) {
                playBtn.classList.add('playing');
                playBtn.innerHTML = '<i class="fas fa-stop"></i>';
            }

            const statusEl = document.getElementById(`status_${prayerKey}`);
            if (statusEl) {
                statusEl.textContent = '🔊 جارٍ التشغيل';
                statusEl.className = 'athan-status-badge status-playing';
            }

            const item = document.getElementById(`athanItem_${prayerKey}`);
            if (item) item.classList.add('athan-active');
        })
        .catch((err) => {
            console.error('❌ خطأ في التشغيل:', err);
            alert(`⚠️ تعذر تشغيل الأذان.\nالملف: ${fileName}\nتأكد من وجود الملف في مجلد athan/`);
            audioPlayers[prayerKey] = null;
        });

    audio.onended = function() {
        if (currentAthanPrayer === prayerKey) {
            stopAthanForPrayer(prayerKey);
            const item = document.getElementById(`athanItem_${prayerKey}`);
            if (item) item.classList.remove('athan-active');
        }
    };
}

  /**
   * تفعيل/إلغاء تفعيل الأذان لصلاة معينة
   */
  function toggleAthanForPrayer(prayerKey) {
    const isActive = athanActive[prayerKey] || false;
    athanActive[prayerKey] = !isActive;

    localStorage.setItem('athanActiveStates', JSON.stringify(athanActive));

    const btn = document.getElementById(`toggleAthanBtn_${prayerKey}`);
    if (btn) {
      if (athanActive[prayerKey]) {
        btn.classList.add('active');
        btn.innerHTML = '<i class="fas fa-bell"></i> مفعل';
      } else {
        btn.classList.remove('active');
        btn.innerHTML = '<i class="fas fa-bell-slash"></i> تفعيل';
      }
    }

    const item = document.getElementById(`athanItem_${prayerKey}`);
    if (item) {
      if (athanActive[prayerKey]) {
        item.classList.add('athan-active');
      } else {
        item.classList.remove('athan-active');
      }
    }

    if (athanActive[prayerKey]) {
      startCountdownForPrayer(prayerKey);
    } else {
      if (countdownIntervals[prayerKey]) {
        clearInterval(countdownIntervals[prayerKey]);
        countdownIntervals[prayerKey] = null;
      }
      if (currentAthanPrayer === prayerKey) {
        stopAthanForPrayer(prayerKey);
        const item = document.getElementById(`athanItem_${prayerKey}`);
        if (item) item.classList.remove('athan-active');
      }
    }
  }

  /**
   * بدء العد التنازلي للصلاة
   */
  function startCountdownForPrayer(prayerKey) {
    if (countdownIntervals[prayerKey]) {
      clearInterval(countdownIntervals[prayerKey]);
      countdownIntervals[prayerKey] = null;
    }

    const prayerTimes = getStoredPrayerTimes();
    let prayerTime = null;
    if (prayerTimes) {
      prayerTime = prayerTimes[prayerKey];
    }

    if (!prayerTime) {
      const el = document.getElementById(`countdown_${prayerKey}`);
      if (el) el.textContent = '⏳ لا يوجد توقيت';
      return;
    }

    updateCountdownDisplay(prayerKey, prayerTime);

    countdownIntervals[prayerKey] = setInterval(() => {
      updateCountdownDisplay(prayerKey, prayerTime);
    }, 1000);
  }

  /**
   * تحديث عرض العد التنازلي
   */
  function updateCountdownDisplay(prayerKey, prayerTime24) {
    const el = document.getElementById(`countdown_${prayerKey}`);
    if (!el) return;

    const remaining = getTimeRemaining(prayerTime24);
    if (remaining === null) {
      el.textContent = '⏳ لا يوجد توقيت';
      return;
    }

  if (remaining <= 0) {
    el.textContent = '🕌 الآن';

    if (athanActive[prayerKey]) {
        const today = new Date().toDateString();
        const lastPlayKey = `lastPlay_${prayerKey}_${today}`;
        if (!localStorage.getItem(lastPlayKey)) {
            playAthanForPrayer(prayerKey);  // ✅ صحيح: معامل واحد فقط
            localStorage.setItem(lastPlayKey, 'played');
            setTimeout(() => {
                localStorage.removeItem(lastPlayKey);
            }, 120000);
        }
    }
    return;
}

    const timeStr = formatCountdown(remaining);
    const parts = timeStr.split(':');
    if (parts.length === 3) {
      const hours = parseInt(parts[0]);
      const minutes = parseInt(parts[1]);
      const seconds = parseInt(parts[2]);

      let display = '';
      if (hours > 0) {
        display += `${hours} <span class="countdown-unit">س</span> `;
      }
      if (hours > 0 || minutes > 0) {
        display += `${minutes} <span class="countdown-unit">د</span> `;
      }
      display += `${seconds} <span class="countdown-unit">ث</span>`;
      el.innerHTML = display;
    } else {
      el.textContent = timeStr;
    }
  }

  /**
   * جلب مواقيت الصلاة المخزنة
   */
  function getStoredPrayerTimes() {
    const saved = localStorage.getItem('prayerTimes');
    if (saved) {
      try {
        return JSON.parse(saved);
      } catch(e) {}
    }
    return null;
  }

  /**
   * تحديث جميع العدادات
   */
  function updateAllCountdowns() {
    const prayerTimes = getStoredPrayerTimes();
    if (!prayerTimes) return;

    const prayers = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
    prayers.forEach(key => {
      if (athanActive[key]) {
        updateCountdownDisplay(key, prayerTimes[key]);
      }
    });
  }

  /**
   * حفظ اختيار المؤذن للصلاة
   */
  function saveMuadhinForPrayer(prayerKey, value) {
    localStorage.setItem(`muadhin_${prayerKey}`, value);
  }

  /**
   * عرض صفحة الأذان
   */
  function renderAthanPage() {
    document.getElementById('mainTitle').innerHTML = '<i class="fas fa-mosque"></i> الأذان';
    document.getElementById('greeting').innerHTML = 'اختر صوت المؤذن لكل صلاة على حدة';
    updateProgress('home');

    const savedStates = localStorage.getItem('athanActiveStates');
    if (savedStates) {
      try {
        athanActive = JSON.parse(savedStates);
      } catch(e) {}
    }

    const prayerTimes = getStoredPrayerTimes() || {};

    const prayers = [
      { key: 'Fajr', name: 'الفجر', icon: '🌙' },
      { key: 'Dhuhr', name: 'الظهر', icon: '🕌' },
      { key: 'Asr', name: 'العصر', icon: '⏳' },
      { key: 'Maghrib', name: 'المغرب', icon: '🌅' },
      { key: 'Isha', name: 'العشاء', icon: '🌙' }
    ];

    let prayersHtml = '';
    prayers.forEach((prayer) => {
      const isActive = athanActive[prayer.key] || false;
      const time = prayerTimes[prayer.key] ? convertTo12Hour(prayerTimes[prayer.key]) : '--:--';
      const savedMuadhin = localStorage.getItem(`muadhin_${prayer.key}`) || 'default';
      const isPlaying = currentAthanPrayer === prayer.key;

     let muadhinOptions = '';
for (let key in MUADHIN_NAMES) {
    muadhinOptions += `<option value="${key}" ${key === savedMuadhin ? 'selected' : ''}>${MUADHIN_NAMES[key]}</option>`;
}

      prayersHtml += `
        <div class="athan-prayer-item ${isActive ? 'athan-active' : ''}" id="athanItem_${prayer.key}">
          <div class="athan-prayer-row">
            <div class="athan-prayer-info">
              <div class="athan-prayer-icon">${prayer.icon}</div>
              <div>
                <div class="athan-prayer-name">${prayer.name}</div>
                <div class="athan-prayer-time">⏰ ${time}</div>
              </div>
            </div>

            <div class="athan-countdown" id="countdown_${prayer.key}">
              <i class="fas fa-hourglass-half" style="font-size:0.7rem; opacity:0.6;"></i>
              <span>${isActive ? '⏳ جارٍ الحساب...' : '⏸ غير مفعل'}</span>
            </div>

            <button class="athan-play-btn ${isPlaying ? 'playing' : ''}" id="playBtn_${prayer.key}"
        onclick="playAthanForPrayer('${prayer.key}')" style="border: none; background: var(--primary-color); padding: 10px 14px; border-radius: 50%; cursor: pointer; color: white; font-size: 1rem;">
  <i class="fas ${isPlaying ? 'fa-stop' : 'fa-play'}"></i>
</button>
          </div>

          <div class="athan-muadhin-row">
            <label>🎙️ المؤذن:</label>
            <select id="muadhinSelect_${prayer.key}" onchange="saveMuadhinForPrayer('${prayer.key}', this.value)">
              ${muadhinOptions}
            </select>

            <button class="athan-toggle-prayer-btn ${isActive ? 'active' : ''}"
                    id="toggleAthanBtn_${prayer.key}"
                    onclick="toggleAthanForPrayer('${prayer.key}')">
              <i class="fas ${isActive ? 'fa-bell' : 'fa-bell-slash'}"></i>
              ${isActive ? 'مفعل' : 'تفعيل'}
            </button>

            <span class="athan-status-badge ${isPlaying ? 'status-playing' : 'status-inactive'}" id="status_${prayer.key}">
              ${isPlaying ? '🔊 جارٍ التشغيل' : '⏹ متوقف'}
            </span>
          </div>
        </div>
      `;
    });

    document.getElementById('app').innerHTML = `
      <div class="athan-card">
        <div class="athan-header">
          <h2>🕌 الأذان</h2>
          <p>🔔 فعّل الأذان لكل صلاة واختر صوت المؤذن المناسب</p>
          <p style="font-size:0.8rem; color:var(--text-muted); margin-top:5px;">
          </p>
        </div>

        ${prayersHtml}

        <a href="#home" class="btn-unified" style="margin-top:20px;"><i class="fas fa-home"></i> العودة للرئيسية</a>
      </div>
    `;

    prayers.forEach(prayer => {
      if (athanActive[prayer.key]) {
        startCountdownForPrayer(prayer.key);
      }
    });

    prayers.forEach(prayer => {
      if (currentAthanPrayer === prayer.key) {
        const playBtn = document.getElementById(`playBtn_${prayer.key}`);
        if (playBtn) {
          playBtn.classList.add('playing');
          playBtn.innerHTML = '<i class="fas fa-stop"></i>';
        }
        const statusEl = document.getElementById(`status_${prayer.key}`);
        if (statusEl) {
          statusEl.textContent = '🔊 جارٍ التشغيل';
          statusEl.className = 'athan-status-badge status-playing';
        }
        const item = document.getElementById(`athanItem_${prayer.key}`);
        if (item) item.classList.add('athan-active');
      }
    });
  }

  // ===================== Routing =====================
  function handleRouting() {
    if (!userData) {
      const localData = localStorage.getItem('userData');
      if (localData) {
        userData = JSON.parse(localData);
      }
    }

    if (!userData && window.location.hash !== '#admin') {
      showRegistration();
      return;
    }

    const hash = window.location.hash || '#home';
    document.body.classList.remove('azkar-mode');

    if (hash === '#home') {
      renderHome();
    } else if (hash === '#azkar') {
      renderAzkarList();
    } else if (hash === '#tasbeeh') {
      renderTasbeeh();
    } else if (hash === '#prophets') {
      renderProphets();
    } else if (hash === '#quran_main') {
      renderQuranMain();
    } else if (hash === '#qibla') {
      renderQibla();
    } else if (hash === '#athan') {
      renderAthanPage();
    } else if (hash === '#settings') {
      renderSettings();
    } else if (hash === '#admin') {
      showAdminPanel();
    } else {
      const type = hash.replace('#', '');
      if (azkarList[type]) {
        renderAzkar(type, azkarList[type]);
      } else {
        renderHome();
      }
    }
    document.getElementById('sidebar').classList.remove('open');
    updateSidebarPointsDisplay();
  }

  // ===================== Event Listeners =====================
  document.getElementById('menuBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.add('open');
  });

  document.getElementById('closeSidebar').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
  });

  document.addEventListener('click', function(e) {
    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.getElementById('menuBtn');

    if (sidebar.classList.contains('open')) {
      if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
        sidebar.classList.remove('open');
      }
    }
  });

  document.getElementById('headerThemeBtn').addEventListener('click', toggleTheme);

  document.getElementById('adminIconBtn').addEventListener('click', () => {
    if (!adminAuthenticated) {
      const pwd = prompt("🔐 أدخل كلمة المرور للأدمن:");
      if (pwd === "21102002") {
        adminAuthenticated = true;
        showAdminPanel();
        window.location.hash = '#admin';
      } else {
        alert("كلمة المرور غير صحيحة");
      }
    } else {
      showAdminPanel();
      window.location.hash = '#admin';
    }
  });

  document.querySelectorAll('.sidebar a[href]').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const href = link.getAttribute('href');
      if (href) {
        window.location.hash = href;
        document.getElementById('sidebar').classList.remove('open');
      }
    });
  });

  document.addEventListener('touchmove', function(e) {
    if (document.body.classList.contains('compass-mode')) {
      e.preventDefault();
    }
  }, { passive: false });

  // ===================== Initialize App =====================
  const savedTheme = localStorage.getItem('appTheme');
  if (savedTheme === 'dark') document.body.classList.add('dark');
  else if (savedTheme === 'reading') document.body.classList.add('reading');

  const savedTasbeeh = localStorage.getItem('tasbeehCount');
  if (savedTasbeeh !== null) {
    counts.tasbeeh = parseInt(savedTasbeeh) || 0;
  }

  checkConnection();

  // Exposer les fonctions globalement
  window.updateCities = updateCities;
  window.updateEditCities = updateEditCities;
  window.toggleTheme = toggleTheme;
  window.handleRouting = handleRouting;
  window.renderHome = renderHome;
  window.renderQuranMain = renderQuranMain;
  window.showAdminPanel = showAdminPanel;
  window.resetAllUsersPoints = resetAllUsersPoints;
  window.incrementUserPoints = incrementUserPoints;
  window.updateSidebarPointsDisplay = updateSidebarPointsDisplay;
  window.logoutUser = logoutUser;
  window.showPointsDetails = showPointsDetails;
  window.openFullscreenQuran = openFullscreenQuran;
  window.closeFullscreenQuran = closeFullscreenQuran;
  window.fullscreenNextPage = fullscreenNextPage;
  window.fullscreenPrevPage = fullscreenPrevPage;
  window.renderAthanPage = renderAthanPage;
  window.playAthanForPrayer = playAthanForPrayer;
  window.toggleAthanForPrayer = toggleAthanForPrayer;
  window.saveMuadhinForPrayer = saveMuadhinForPrayer;

  window.addEventListener('hashchange', handleRouting);

  if (!checkExistingUser()) {
    handleRouting();
  }

  // Mettre à jour les compteurs toutes les minutes
  setInterval(() => {
    updateAllCountdowns();
  }, 60000);

</script>
</body>
</html>
