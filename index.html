بداية دعوة هود

بعث الله هوداً إلى قومه عاد يدعوهم إلى عبادة الله وحده، وترك عبادة الأصنام التي لا تضر ولا تنفع. كان هود من أشراف قومه، وكانت دعوته بدأت في فترة من القحط والجدب، فأمرهم أن يستغفروا الله ليرسل عليهم مطراً ويمددهم بقوة وأموال وبنين.

نهاية قوم عاد ونجاة هود

بعد أن أهلك الله قوم عاد، نجا هود ومن آمن معه من العذاب، وخرجوا من الأرض التي هلك فيها قومهم، وذهبوا إلى مكة، وعاشوا هناك. وقد كان هود عليه السلام يدعو الله دائماً ويشكره على نجاته، ويعظ الناس بذكرى ما حدث لقومه الذين طغوا وتكبروا.

📖 آية: وَأُتْبِعُوا فِي هَٰذِهِ الدُّنْيَا لَعْنَةً وَيَوْمَ الْقِيَامَةِ ۗ أَلَا إِنَّ عَادًا كَفَرُوا رَبَّهُمْ ۗ أَلَا بُعْدًا لِّعَادٍ قَوْمِ هُودٍ

توفي هود عليه السلام بعد حياة طويلة مليئة بالدعوة والصبر. وقيل أن قبره في حضرموت، وهو مكان معروف حتى اليوم.

بعث الله شعيباً إلى قومه يدعوهم إلى عبادة الله وحده، وترك عبادة الأصنام، وأن يتقوا الله في البيع والشراء، وأن يعطوا الناس حقوقهم، وأن لا يطففوا المكيال والميزان، وأن لا يفسدوا في الأرض.

📖 آية: قَالَ يَا قَوْمِ اعْبُدُوا اللَّهَ مَا لَكُم مِّنْ إِلَٰهٍ غَيْرُهُ ۖ قَدْ جَاءَتْكُم بَيِّنَةٌ مِّن رَّبِّكُمْ ۖ فَأَوْفُوا الْكَيْلَ وَالْمِيزَانَ

حوار شعيب مع قومه

رفض قوم شعيب دعوته، وقالوا له: أصلاتك تأمرك أن نترك ما يعبد آباؤنا، أو أن نفعل في أموالنا ما نشاء، إنك لأنت الحليم الرشيد. واتهموه بالسحر والجنون، وطلبوا منه أن يأتيهم بعذاب الله إن كان صادقاً.

📖 آية: قَالُوا يَا شُعَيْبُ مَا نَفْقَهُ كَثِيرًا مِّمَّا تَقُولُ وَإِنَّا لَنَرَاكَ فِينَا ضَعِيفًا ۖ وَلَوْلَا رَهْطُكَ لَرَجَمْنَاكَ

إصرار شعيب على الدعوة

رغم كل التهم والاتهامات، ظل شعيب ثابتاً على دعوته، ينصح قومه ويحذرهم، ويذكرهم بنعم الله عليهم، ويخبرهم أن التوبة إلى الله هي السبيل للنجاة.

📖 آية: وَيَا قَوْمِ اسْتَغْفِرُوا رَبَّكُمْ ثُمَّ تُوبُوا إِلَيْهِ يُرْسِلِ السَّمَاءَ عَلَيْكُم مِّدْرَارًا وَيَزِدْكُمْ قُوَّةً إِلَىٰ قُوَّتِكُمْ

عقاب قوم شعيب

لما أصر قوم شعيب على كفرهم وطغيانهم، أرسل الله عليهم عذاباً شديداً، فأرسل عليهم صيحة، فماتوا جميعاً، وأصبحوا في ديارهم جاثمين، كما أرسل الله عليهم عذاب يوم الظلة (السحابة التي أحرقتهم بالنار).

📖 آية: فَأَخَذَتْهُمُ الرَّجْفَةُ فَأَصْبَحُوا فِي دَارِهِمْ جَاثِمِينَ

📖 آية: فَكَذَّبُوهُ فَأَخَذَهُمْ عَذَابُ يَوْمِ الظُّلَّةِ ۚ إِنَّهُ كَانَ عَذَابَ يَوْمٍ عَظِيمٍ

نجاة شعيب والمؤمنين

نجا شعيب ومن آمن معه من العذاب، وأنجاهم الله من العقاب الذي حل بقومهم، وقد كان شعيب يعظ قومه ويحذرهم، ولكنهم لم يستمعوا له، فضلوا عن الطريق الحق.

📖 آية: فَلَمَّا جَاءَ أَمْرُنَا نَجَّيْنَا شُعَيْبًا وَالَّذِينَ آمَنُوا مَعَهُ بِرَحْمَةٍ مِّنَّا

وفاته

توفي شعيب عليه السلام بعد حياة طويلة مليئة بالدعوة والصبر، ودفن في مدين.

🔑 الدروس المستفادة:

• شعيب نبي أرسل إلى قوم مدين وأصحاب الأيكة

• كان قومه يطففون المكيال والميزان

• نهى شعيب عن الظلم والفساد

• عاقبة الظالمين والمفسدين الهلاك

• العدل في التعامل من صفات المؤمنين

• عذاب يوم الظلة كان عقاباً للكافرين`

    story: `تعريف سيدنا موسى ونسبه

موسى عليه السلام هو كليم الله، وأحد أولي العزم من الرسل، وهو من بني إسرائيل، ورد ذكره في القرآن كثيراً. هو موسى بن عمران بن قاهث بن لاوي بن يعقوب بن إسحاق بن إبراهيم عليهم السلام. ولد في مصر في وقت كان فرعون يذبح أبناء بني إسرائيل خوفاً من ظهور نبي منهم يهدد ملكه.

📖 آية: وَاذْكُرْ فِي الْكِتَابِ مُوسَىٰ ۖ إِنَّهُ كَانَ مُخْلَصًا وَكَانَ رَسُولًا نَّبِيًّا

📖 آية: وَكَلَّمَ اللَّهُ مُوسَىٰ تَكْلِيمًا

ولادة موسى ووضعه في التابوت

ولد موسى في زمان الفرعون الذي كان يقتل أبناء بني إسرائيل، فأوحى الله إلى أم موسى أن ترضعه، فإذا خافت عليه فألقيه في اليم ولا تخافي. فوضعته في تابوت وألقته في النيل، فجرفه الماء إلى قصر فرعون، والتقطته امرأة فرعون (آسية) وربته في قصرها.

📖 آية: وَأَوْحَيْنَا إِلَىٰ أُمِّ مُوسَىٰ أَنْ أَرْضِعِيهِ ۖ فَإِذَا خِفْتِ عَلَيْهِ فَأَلْقِيهِ فِي الْيَمِّ

📖 آية: فَالْتَقَطَهُ آلُ فِرْعَوْنَ لِيَكُونَ لَهُمْ عَدُوًّا وَحَزَنًا

نشأة موسى في قصر فرعون

نشأ موسى في قصر فرعون، وكانت أمه ترضعه بأمر من الله، وقد كبر موسى في القصر، وكان فرعون وآسية يعاملونه كابن لهم، ولكن الله أعدّ موسى ليكون خصماً لفرعون وداعياً إلى التوحيد.

هروب موسى إلى مدين

كبر موسى، وبينما كان يسير في المدينة، رأى رجلين يتضاربان: واحد من بني إسرائيل، وآخر من قوم فرعون، فاستغاث به الإسرائيلي، فضربه موسى فقضى عليه، وندم موسى على فعله، وهرب من مصر خوفاً من القصاص، واتجه إلى مدين.

📖 آية: فَأَصْبَحَ فِي الْمَدِينَةِ خَائِفًا يَتَرَقَّبُ

📖 آية: وَلَمَّا تَوَجَّهَ تِلْقَاءَ مَدْيَنَ قَالَ عَسَىٰ رَبِّي أَن يَهْدِيَنِي سَوَاءَ السَّبِيلِ

زواج موسى من ابنة شعيب

وصل موسى إلى مدين، ورأى فتاتين تسقيان أغنامهما، فسقى لهما، ثم جاء أبوهما (شعيب عليه السلام)، ودعاه إلى الضيافة، وسأله عن قصته، فأخبره، فقال له شعيب: لا تخف، نجوت من القوم الظالمين. وأعطاه شعيب إحدى ابنتيه زوجة، على أن يعمل عنده عشر سنين.

📖 آية: قَالَ إِنِّي أُرِيدُ أَنْ أُنكِحَكَ إِحْدَى ابْنَتَيَّ هَاتَيْنِ عَلَىٰ أَن تَأْجُرَنِي ثَمَانِيَ حِجَجٍ

نبوة موسى وتكليم الله له

بعد أن قضى موسى الأجل الذي وافقه عليه شعيب، خرج بأهله إلى الشام، وفي طريقه، رأى ناراً على جانب الجبل، فقال لأهله: امكثوا إني آنست ناراً. فلما جاءها، ناداه ربه من الشجرة المباركة في الوادي الأيمن: يا موسى إني أنا الله رب العالمين، وألق عصاك، فألقاها فإذا هي حية تسعى، وادخل يدك في جيبك تخرج بيضاء من غير سوء. وأمره بالذهاب إلى فرعون لدعوته إلى عبادة الله.

📖 آية: فَلَمَّا أَتَاهَا نُودِيَ مِن شَاطِئِ الْوَادِ الْأَيْمَنِ فِي الْبُقْعَةِ الْمُبَارَكَةِ مِنَ الشَّجَرَةِ أَن يَا مُوسَىٰ إِنِّي أَنَا اللَّهُ رَبُّ الْعَالَمِينَ

📖 آية: وَأَنْ أَلْقِ عَصَاكَ ۖ فَلَمَّا رَآهَا تَهْتَزُّ كَأَنَّهَا جَانٌّ وَلَّىٰ مُدْبِرًا وَلَمْ يُعَقِّبْ

دعوة موسى لفرعون

ذهب موسى مع أخيه هارون إلى فرعون، ودعواه إلى عبادة الله وحده، وأظهر له الآيات والمعجزات، ولكن فرعون كفر واستكبر، وقال: أنا ربكم الأعلى، وجمع السحرة لمناظرة موسى، ولكن آيات الله غلبتهم، فآمن السحرة وقالوا: آمنا برب العالمين رب موسى وهارون.

📖 آية: اذْهَبَا إِلَىٰ فِرْعَوْنَ إِنَّهُ طَغَىٰ * فَقُولَا لَهُ قَوْلًا لَّيِّنًا لَّعَلَّهُ يَتَذَكَّرُ أَوْ يَخْشَىٰ

📖 آية: فَأُلْقِيَ السَّحَرَةُ سُجَّدًا قَالُوا آمَنَّا بِرَبِّ هَارُونَ وَمُوسَىٰ

عقاب فرعون وجنده

بعد أن أصر فرعون على كفره، أرسل الله على مصر العديد من الآيات، فسلط عليهم الطوفان والجراد والقمل والضفادع والدم، ولكن فرعون استكبر، فأرسل الله موسى ليخرج بني إسرائيل من مصر، وفرعون وجنوده يلحقون بهم، فلما وصلوا إلى البحر، أمر الله موسى أن يضرب البحر بعصاه، فانفلق البحر، ونجا بنو إسرائيل، وغرق فرعون وجنوده.

📖 آية: فَلَمَّا تَرَاءَى الْجَمْعَانِ قَالَ أَصْحَابُ مُوسَىٰ إِنَّا لَمُدْرَكُونَ * قَالَ كَلَّا ۖ إِنَّ مَعِيَ رَبِّي سَيَهْدِينِ

📖 آية: فَأَوْحَيْنَا إِلَىٰ مُوسَىٰ أَنِ اضْرِب بِّعَصَاكَ الْبَحْرَ ۖ فَانفَلَقَ فَكَانَ كُلُّ فِرْقٍ كَالطَّوْدِ الْعَظِيمِ

خروج بني إسرائيل من مصر ونزول التوراة

خرج بنو إسرائيل من مصر، وتوجهوا إلى الشام، وفي أثناء الطريق، ذهب موسى إلى الجبل لميقات ربه، وكلمه الله، وأنزل عليه التوراة، ولكن قومه عبدوا العجل في غيابه، فغضب موسى، وأمرهم بتوبة قاسية.

📖 آية: وَلَمَّا جَاءَ مُوسَىٰ لِمِيقَاتِنَا وَكَلَّمَهُ رَبُّهُ قَالَ رَبِّ أَرِنِي أَنظُرْ إِلَيْكَ

📖 آية: وَاتَّخَذَ قَوْمُ مُوسَىٰ مِن بَعْدِهِ مِنْ حُلِيِّهِمْ عِجْلًا جَسَدًا لَّهُ خُوَارٌ

تجوال بني إسرائيل ووفاته

تاه بنو إسرائيل في الأرض أربعين سنة، وكان موسى يقودهم ويرشدهم، إلى أن توفي في التيه، ودفن هناك، وقيل أن قبره في جبل نيبو.

🔑 الدروس المستفادة:

• موسى كليم الله وأحد أولي العزم

• قصة موسى مع فرعون هي من أعظم القصص

• المعجزات لا تنفع مع الكافرين الذين يصرون على كفرهم

• الإخلاص لله هو أساس النجاة

• الصبر على الدعوة مطلوب من الأنبياء

• الله يعين المؤمنين وينصرهم على أعدائهم`

• كان عادلاً حكيماً في حكمه`

    story: `تعريف سيدنا سليمان ونسبه

📖 آية: فَسَخَّرْنَا لَهُ الرِّيحَ تَجْرِي بِأَمْرِهِ رُخَاءً حَيْثُ أَصَابَ

بناء بيت المقدس

بنى سليمان عليه السلام بيت المقدس بأمر من الله، وكان من أعظم الأبنية في زمانه، وقد بناه من الحجارة والذهب والفضة، وأتم بناءه في سبع سنوات.

🔑 الدروس المستفادة:

• بناء بيت المقدس كان من أعظم أعماله

• الموت حق على كل نفس حتى للأنبياء`

• استشهد في سبيل الله`

كان إدريس عليه السلام تام القامة، حسن الوجه، كثير اللحية، عريض المنكبين، ضخم العظام قليل اللحم، برّاق العينين أكحلهما. كان متأنياً في كلامه، كثير الصمت، ساكن الأعضاء هادئاً. إذا مشى أكثر نظره إلى الأرض، وكان كثير الفكرة والتفكر في خلق الله. به عبسة وإذا اغتاظ احتدّ، ويحرّك سبابته إذا تكلّم. وكان شديد التواضع والخشوع لله تعالى.

بعد وفاة آدم عليه السلام، قاد ذريته نبي الله شيث، وأنزل الله عليه الكثير من الصحف والتعاليم. ثم خلفه من بعده حفيده الخامس نبي الله إدريس عليه السلام. كان يدعو الناس على شريعة شيث ويضيف عليها بأمر الله، وكان يدعو إلى عبادة الله وحده ونبذ عبادة الأصنام التي بدأت تظهر بين الناس.

فلما انتشر فساد ذرية قابيل واعتدائهم على المؤمنين، شرع الجهاد في سبيل الله، فكان إدريس أول من قاتل في سبيل الله، وأول من سبى في سبيل الله. فقد جهز جيشاً من الخيل والرجال وقاتل المفسدين فهزمهم وسبى منهم.

📖 آية: إِنَّا أَرْسَلْنَا نُوحًا وَإِبْرَاهِيمَ وَجَعَلْنَا فِي ذُرِّيَّتِهِمَا النُّبُوَّةَ وَالْكِتَابَ ۖ فَمِنْهُم مُّهْتَدٍ ۖ وَكَثِيرٌ مِّنْهُمْ فَاسِقُونَ

أول من كتب بالقلم

أول خياط في التاريخ

نقل ابن حجر في الفتح عن ابن إسحاق أن أول من خاط الثياب ولبسها هو إدريس عليه السلام، وكان الناس قبل ذلك يلبسون الجلود. فقد علمه الله صناعة الخياطة، فكان أول من صنع الثياب المخيطة ولبسها، وعلّم الناس هذه الحرفة النافعة.

مكانته عند الله ورفعه إلى السماء

لإدريس عليه السلام مكانة عظيمة عند الله تعالى، ولهذا رفعه الله مكاناً علياً. وفي الحديث الصحيح عن النبي ﷺ في قصة الإسراء والمعراج، أنّه التقى بإدريس في السماء الرابعة.

📖 آية: وَرَفَعْنَاهُ مَكَانًا عَلِيًّا

قصة رفعه إلى السماء

جاء في رواية عن ابن عباس وكعب الأحبار أنه أوحى الله إلى إدريس أنه يرفع له كل يوم مثل عمل جميع بني آدم، فأحب أن يزداد عملاً، فأتاه خليل له من الملائكة، فقال له: إن الله أوحى إلي كذا وكذا، فكلم ملك الموت حتى أزداد عملاً، فحمله بين جناحيه ثم صعد به إلى السماء، فلما كان في السماء الرابعة تلقاه ملك الموت منحدراً، فقال: وأين إدريس؟ قال: هو ذا على ظهري، فقال ملك الموت: يا للعجب! بعثت وقيل لي: اقبض روح إدريس في السماء الرابعة، فجعلت أقول: كيف أقبض روحه وهو في الأرض؟! فقبض روحه هناك، فذلك قول الله عز وجل: وَرَفَعْنَاهُ مَكَانًا عَلِيًّا.

وفاته

• التقى به النبي ﷺ في السماء الرابعة ليلة الإسراء

فأوحى الله إليه أن يصنع السفينة، وأن يحمل فيها من كل زوجين اثنين، وأهله إلا من سبق عليه القول، ومن آمن. وكان نوح يصنع السفينة، وكان قومه يسخرون منه، فيقول: إن تسخروا منا فإنا نسخر منكم كما تسخرون.

        {zekr:"رَضِيتُ بِاللَّهِ رَبًّا، وَبِالْإِسْلَامِ دِينًا، وَبِمُحَمَّدٍ ﷺ نَبِيًّا ورسولًا",max:3},
        {zekr:"يَا حَيُّ يَا قَيُّومُ، بِرَحْمَتِكَ أَسْتَغِيثُ، أَصْلِحْ لِي شَأْنِيَ كُلَّهُ، وَلَا تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ.",max:1},
        {zekr:"سُبْحَانَ اللَّهِ وَبِحَمْدِهِ عدد خلقه، ورضا نفسه، وزنة عرشه، ومداد كلماته",max:3},
        {zekr:"اللهم إني أسألك علمًا نافعًا، ورزقًا طيبًا، وعملًا متقبلًا",max:1},
        {zekr:"اللَّهُمَّ عَالِمَ الْغَيْبِ وَالشَّهَادَةِ، فَاطِرَ السَّمَاوَاتِ وَالْأَرْضِ، رَبَّ كُلِّ شَيْءٍ وَمَلِيكَهُ، أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا أَنْتَ، أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي، وَمِنْ شَرِّ الشَّيْطَانِ وَشِرْكِهِ، وَأَنْ أَقْتَرِفَ عَلَى نَفْسِي سُوءًا، أَوْ أَجُرَّهُ إِلَى مُسْلِمٍ",max:1},
        {zekr:"اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي الدُّنْيَا وَالآخِرَةِ، اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي دِينِي وَدُنْيَايَ وَأَهْلِي وَمَالِي، اللَّهُمَّ اسْتُرْ عَوْرَاتِي وَآمِنْ رَوْعَاتِي، اللَّهُمَّ احْفَظْنِي مِنْ بَيْنِ يَدَيَّ وَمِنْ خَلْفِي وَعَنْ يَمِينِي وَعَنْ شِمَالِي وَمِنْ فَوْقِي، وَأَعُوذُ بِعَظَمَتِكَ أَنْ أُغْتَالَ مِنْ تَحْتِي",max:1},
        {zekr:"لَا إِلَٰهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ.",max:100},
        {zekr:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ كَمَا صَلَّيْتَ عَلَى إِبْرَاهِيمَ وَعَلَى آلِ إِبْرَاهِيمَ، وَبَارِكْ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ كَمَا بَارَكْتَ عَلَى إِبْرَاهِيمَ وَعَلَى آلِ إِبْرَاهِيمَ فِي الْعَالَمِينَ إِنَّكَ حَمِيدٌ مَجِيدٌ",max:10}

    evening: {
      title: 'أذكار المساء',
      items: [
        {zekr:"آمَنَ الرَّسُولُ بِمَا أُنْزِلَ إِلَيْهِ مِنْ رَبِّهِ وَالْمُؤْمِنُونَ ۚ كُلٌّ آمَنَ بِاللَّهِ وَمَلَائِكَتِهِ وَكُتُبِهِ وَرُسُلِهِ لَا نُفَرِّقُ بَيْنَ أَحَدٍ مِنْ رُسُلِهِ ۚ وَقَالُوا سَمِعْنَا وَأَطَعْنَا ۖ غُفْرَانَكَ رَبَّنَا وَإِلَيْكَ الْمَصِيرُ. لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا ۚ لَهَا مَا كَسَبَتْ وَعَلَيْهَا مَا اكْتَسَبَتْ ۗ رَبَّنَا لَا تُؤَاخِذْنَا إِنْ نَسِينَا أَوْ أَخْطَأْنَا ۚ رَبَّنَا وَلَا تَحْمِلْ عَلَيْنَا إِصْرًا كَمَا حَمَلْتَهُ عَلَى الَّذِينَ مِنْ قَبْلِنَا ۚ رَبَّنَا وَلَا تُحَمِّلْنَا مَا لَا طَاقَةَ لَنَا بِهِ ۖ وَاعْفُ عَنَّا وَاغْفِرْ لَنَا وَارْحَمْنَا ۚ أَنْتَ مَوْلَانَا فَانْصُرْنَا عَلَى الْقَوْمِ الْكَافِرِينَ",max:1},
        {zekr:"اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَنْ ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ",max:1},
        {zekr:"قُلْ هُوَ اللَّهُ أَحَدٌ ۝ اللَّهُ الصَّمَدُ ۝ لَمْ يَلِدْ وَلَمْ يُولَدْ ۝ وَلَمْ يَكُنْ لَهُ كُفُوًا أَحَدٌ",max:3},
        {zekr:"قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ ۝ مِنْ شَرِّ مَا خَلَقَ ۝ وَمِنْ شَرِّ غَاسِقٍ إِذَا وَقَبَ ۝ وَمِنْ شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ ۝ وَمِنْ شَرِّ حَاسِدٍ إِذَا حَسَدَ",max:3},
        {zekr:"قُلْ أَعُوذُ بِرَبِّ النَّاسِ ۝ مَلِكِ النَّاسِ ۝ إِلَٰهِ النَّاسِ ۝ مِنْ شَرِّ الْوَسْوَاسِ الْخَنَّاسِ ۝ الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ ۝ مِنَ الْجِنَّةِ وَالنَّاسِ",max:3},
        {zekr:"أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَٰهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ. رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ",max:1},
        {zekr:"اللَّهُمَّ بِكَ أَمْسَيْنَا، وَبِكَ أَصْبَحْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ النُّشُورُ",max:1},
        {zekr:"أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ رَبِّ الْعَالَمِينَ، اللَّهُمَّ إِنِّي أَمْسَيْتُ أُشْهِدُكَ وَأُشْهِدُ حَمَلَةَ عَرْشِكَ وَمَلَائِكَتَكَ وَجَمِيعَ خَلْقِكَ، أَنَّكَ أَنْتَ اللَّهُ لَا إِلَهَ إِلَّا أَنْتَ وَحْدَكَ لَا شَرِيكَ لَكَ، وَأَنَّ مُحَمَّدًا عَبْدُكَ وَرَسُولُكَ. اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ هَذَا الْيَوْمِ فَتْحَهُ وَنَصْرَهُ وَنُورَهُ وَبَرَكَتَهُ وَهُدَاهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِيهِ وَشَرِّ مَا بَعْدَهُ",max:1},
        {zekr:"أَمْسَيْنَا عَلَى فِطْرَةِ الْإِسْلَامِ، وَعَلَى كَلِمَةِ الْإِخْلَاصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ ﷺ، وَعَلَى مِلَّةِ أَبِينَا إِبْرَاهِيمَ، حَنِيفًا مُسْلِمًا، وَمَا كَانَ مِنَ الْمُشْرِكِينَ.",max:1},
        {zekr:"اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَٰهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي، فَاغْفِرْ لِي فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ",max:1},
        {zekr:"اللَّهُمَّ إِنِّي أَمْسَيْتُ أُشْهِدُكَ، وَأُشْهِدُ حَمَلَةَ عَرْشِكَ، وَمَلَائِكَتَكَ، وَجَمِيعَ خَلْقِكَ، أَنَّكَ أَنْتَ اللَّهُ لَا إِلَٰهَ إِلَّا أَنْتَ وَحْدَكَ لَا شَرِيكَ لَكَ، وَأَنَّ مُحَمَّدًا عَبْدُكَ وَرَسُولُكَ",max:4},
        {zekr:"اللَّهُمَّ مَا أمسى بِي مِنْ نِعْمَةٍ أَوْ بِأَحَدٍ مِنْ خَلْقِكَ فَمِنْكَ وَحْدَكَ لَا شَرِيكَ لَكَ، فَلَكَ الْحَمْدُ وَلَكَ الشُّكْرُ",max:1},
        {zekr:"اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لَا إِلَٰهَ إِلَّا أَنْتَ. اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْكُفْرِ وَالْفَقْرِ، وَأَعُوذُ بِكَ مِنْ عَذَابِ الْقَبْرِ، لَا إِلَٰهَ إِلَّا أَنْتَ، اللهم إني أعوذ بك من الهم والحزن والعجز والكسل وأعوذ بك من الجبن والبخل وغلبة الدين وقهر الرجال",max:3},

        {zekr:"بِاسْمِكَ رَبِّـي وَضَعْـتُ جَنْـبي ، وَبِكَ أَرْفَعُـه، فَإِن أَمْسَـكْتَ نَفْسـي فارْحَـمْها ، وَإِنْ أَرْسَلْتَـها فاحْفَظْـها بِمـا تَحْفَـظُ بِه عِبـادَكَ الصّـالِحـين.", max:1},
        {zekr:"اللّهُـمَّ إِنَّـكَ خَلَـقْتَ نَفْسـي وَأَنْـتَ تَوَفّـاهـا لَكَ ممَـاتـها وَمَحْـياها ، إِنْ أَحْيَيْـتَها فاحْفَظْـها ، وَإِنْ أَمَتَّـها فَاغْفِـرْ لَـها . اللّهُـمَّ إِنَّـي أَسْـأَلُـكَ العـافِـيَة.", max:1},
        {zekr:"اللّهُـمَّ قِنـي عَذابَـكَ يَـوْمَ تَبْـعَثُ عِبـادَك.", max:3},
        {zekr:"بِاسْـمِكَ اللّهُـمَّ أَمـوتُ وَأَحْـيا.", max:1},
        {zekr:"الـحَمْدُ للهِ الَّذي أَطْـعَمَنا وَسَقـانا، وَكَفـانا، وَآوانا، فَكَـمْ مِمَّـنْ لا كـافِيَ لَـهُ وَلا مُـؤْوي.", max:1},
        {zekr: "اللهم أنت ربي لا إله إلا أنت خلقتني وأنا عبدك وأنا على عهدك ووعدك ما استطعت .. أعوذ بك من شر ما صنعت أبوء لك بنعمتك علي وأبوء بذنبي فاغفر لي فإنه لا يغفر الذنوب إلا أنت.", max: 1 },
        {zekr: "اللهم إني أسلمت نفسي إليك، ووجهت وجهي إليك، وفوضت أمري إليك، وألجأت ظهري إليك .. لا ملجأ ولا منجى منك إلا إليك.. آمنت بكتابك الذي أنزلت وبنبيك الذي أرسلت.", max: 1 },
        {zekr:"اللّهُـمَّ عالِـمَ الغَـيبِ وَالشّـهادةِ فاطِـرَ السّماواتِ وَالأرْضِ رَبَّ كُـلِّ شَـيءٍ وَمَليـكَه، أَشْهـدُ أَنْ لا إِلـهَ إِلاّ أَنْت، أَعـوذُ بِكَ مِن شَـرِّ نَفْسـي، وَمِن شَـرِّ الشَّيْـطانِ وَشِـرْكِه، وَأَنْ أَقْتَـرِفَ عَلـى نَفْسـي سوءاً أَوْ أَجُـرَّهُ إِلـى مُسْـلِم.", max:1},
        {zekr:"اللّهُـمَّ أَسْـلَمْتُ نَفْـسي إِلَـيْكَ، وَفَوَّضْـتُ أَمْـري إِلَـيْكَ، وَوَجَّـهْتُ وَجْـهي إِلَـيْكَ، وَأَلْـجَـاْتُ ظَهـري إِلَـيْكَ، رَغْبَـةً وَرَهْـبَةً إِلَـيْكَ، لا مَلْجَـأَ وَلا مَنْـجـا مِنْـكَ إِلاّ إِلَـيْكَ، آمَنْـتُ بِكِتـابِكَ الّـذي أَنْزَلْـتَ وَبِنَبِـيِّـكَ الّـذي أَرْسَلْـت.", max:1},
        {zekr:"اللهم رب السموات السبع وما أظلت، ورب الأرضين وما أقلت، ورب الشياطين وما أضلت، كن لي جارا من خلقك كلهم جميعا أن يفرط علي أحد منهم أو أن يبغي علي، عز جارك، وجل ثناؤك ولا إله غيرك، ولا إله إلا أنت.", max:1},
        {zekr:"قال النبي ﷺ من قال حين يأوي إلى فراشه ؛ لا إله إلا الله وحده لا شريك له، له الملك وله الحمد هو على كل شىء قدير ، لا حول ولا قوة إلا بالله العلي العظيم ، سبحان الله وبحمده والحمدالله ولا إله إلا الله والله أكبر. غُفرت ذنوبه ولو كانت مثل زبد البحر.", max:1},
        {zekr: "سُبْحَانَ اللَّهِ", max: 33 },
        {zekr: "الْحَمْدُ لِلَّهِ", max: 33 },
        {zekr: "اللَّهُ أَكْبَرُ", max: 33 },
        {zekr:"قُلْ هُوَ اللَّهُ أَحَدٌ ۝ اللَّهُ الصَّمَدُ ۝ لَمْ يَلِدْ وَلَمْ يُولَدْ ۝ وَلَمْ يَكُنْ لَهُ كُفُوًا أَحَدٌ",max:3},
        {zekr:"قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ ۝ مِنْ شَرِّ مَا خَلَقَ ۝ وَمِنْ شَرِّ غَاسِقٍ إِذَا وَقَبَ ۝ وَمِنْ شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ ۝ وَمِنْ شَرِّ حَاسِدٍ إِذَا حَسَدَ",max:3},
        {zekr:"قُلْ أَعُوذُ بِرَبِّ النَّاسِ ۝ مَلِكِ النَّاسِ ۝ إِلَٰهِ النَّاسِ ۝ مِنْ شَرِّ الْوَسْوَاسِ الْخَنَّاسِ ۝ الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ ۝ مِنَ الْجِنَّةِ وَالنَّاسِ",max:3},
        {zekr:"قُلۡ يَٰٓأَيُّهَا ٱلۡكَٰفِرُونَ * لَآ أَعۡبُدُ مَا تَعۡبُدُونَ * وَلَآ أَنتُمۡ عَٰبِدُونَ مَآ أَعۡبُدُ * وَلَآ أَنَا۠ عَابِدٞ مَّا عَبَدتُّمۡ * وَلَآ أَنتُمۡ عَٰبِدُونَ مَآ أَعۡبُدُ * لَكُمۡ دِينُكُمۡ وَلِيَ دِينِ", max:1},
        {zekr:"آمَنَ الرَّسُولُ بِمَا أُنْزِلَ إِلَيْهِ مِنْ رَبِّهِ وَالْمُؤْمِنُونَ ۚ كُلٌّ آمَنَ بِاللَّهِ وَمَلَائِكَتِهِ وَكُتُبِهِ وَرُسُلِهِ لَا نُفَرِّقُ بَيْنَ أَحَدٍ مِنْ رُسُلِهِ ۚ وَقَالُوا سَمِعْنَا وَأَطَعْنَا ۖ غُفْرَانَكَ رَبَّنَا وَإِلَيْكَ الْمَصِيرُ. لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا ۚ لَهَا مَا كَسَبَتْ وَعَلَيْهَا مَا اكْتَسَبَتْ ۗ رَبَّنَا لَا تُؤَاخِذْنَا إِنْ نَسِينَا أَوْ أَخْطَأْنَا ۚ رَبَّنَا وَلَا تَحْمِلْ عَلَيْنَا إِصْرًا كَمَا حَمَلْتَهُ عَلَى الَّذِينَ مِنْ قَبْلِنَا ۚ رَبَّنَا وَلَا تُحَمِّلْنَا مَا لَا طَاقَةَ لَنَا بِهِ ۖ وَاعْفُ عَنَّا وَاغْفِرْ لَنَا وَارْحَمْنَا ۚ أَنْتَ مَوْلَانَا فَانْصُرْنَا عَلَى الْقَوْمِ الْكَافِرِينَ",max:1},
        {zekr:"اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَنْ ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ",max:1},
        {zekr:"تَبَٰرَكَ ٱلَّذِي بِيَدِهِ ٱلۡمُلۡكُ وَهُوَ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرٌ (1) ٱلَّذِي خَلَقَ ٱلۡمَوۡتَ وَٱلۡحَيَوٰةَ لِيَبۡلُوَكُمۡ أَيُّكُمۡ أَحۡسَنُ عَمَلٗاۚ وَهُوَ ٱلۡعَزِيزُ ٱلۡغَفُورُ (2) ٱلَّذِي خَلَقَ سَبۡعَ سَمَٰوَٰتٖ طِبَاقٗاۖ مَّا تَرَىٰ فِي خَلۡقِ ٱلرَّحۡمَٰنِ مِن تَفَٰوُتٖۖ فَٱرۡجِعِ ٱلۡبَصَرَ هَلۡ تَرَىٰ مِن فُطُورٖ (3) ثُمَّ ٱرۡجِعِ ٱلۡبَصَرَ كَرَّتَيۡنِ يَنقَلِبۡ إِلَيۡكَ ٱلۡبَصَرُ خَاسِئٗا وَهُوَ حَسِيرٞ (4) وَلَقَدۡ زَيَّنَّا ٱلسَّمَآءَ ٱلدُّنۡيَا بِمَصَٰبِيحَ وَجَعَلۡنَٰهَا رُجُومٗا لِّلشَّيَٰطِينِۖ وَأَعۡتَدۡنَا لَهُمۡ عَذَابَ ٱلسَّعِيرِ (5) وَلِلَّذِينَ كَفَرُواْ بِرَبِّهِمۡ عَذَابُ جَهَنَّمَۖ وَبِئۡسَ ٱلۡمَصِيرُ (6) إِذَآ أُلۡقُواْ فِيهَا سَمِعُواْ لَهَا شَهِيقٗا وَهِيَ تَفُورُ (7) تَكَادُ تَمَيَّزُ مِنَ ٱلۡغَيۡظِۖ كُلَّمَآ أُلۡقِيَ فِيهَا فَوۡجٞ سَأَلَهُمۡ خَزَنَتُهَآ أَلَمۡ يَأۡتِكُمۡ نَذِيرٞ (8) قَالُواْ بَلَىٰ قَدۡ جَآءَنَا نَذِيرٞ فَكَذَّبۡنَا وَقُلۡنَا مَا نَزَّلَ ٱللَّهُ مِن شَيۡءٍ إِنۡ أَنتُمۡ إِلَّا فِي ضَلَٰلٖ كَبِيرٖ (9) وَقَالُواْ لَوۡ كُنَّا نَسۡمَعُ أَوۡ نَعۡقِلُ مَا كُنَّا فِيٓ أَصۡحَٰبِ ٱلسَّعِيرِ (10) فَٱعۡتَرَفُواْ بِذَنۢبِهِمۡ فَسُحۡقٗا لِّأَصۡحَٰبِ ٱلسَّعِيرِ (11) إِنَّ ٱلَّذِينَ يَخۡشَوۡنَ رَبَّهُم بِٱلۡغَيۡبِ لَهُم مَّغۡفِرَةٞ وَأَجۡرٞ كَبِيرٞ (12) وَأَسِرُّواْ قَوۡلَكُمۡ أَوِ ٱجۡهَرُواْ بِهِۦٓۖ إِنَّهُۥ عَلِيمُۢ بِذَاتِ ٱلصُّدُورِ (13) أَلَا يَعۡلَمُ مَنۡ خَلَقَ وَهُوَ ٱللَّطِيفُ ٱلۡخَبِيرُ (14) هُوَ ٱلَّذِي جَعَلَ لَكُمُ ٱلۡأَرۡضَ ذَلُولٗا فَٱمۡشُواْ فِي مَنَاكِبِهَا وَكُلُواْ مِن رِّزۡقِهِۦۖ وَإِلَيۡهِ ٱلنُّشُورُ (15) ءَأَمِنتُم مَّن فِي ٱلسَّمَآءِ أَن يَخۡسِفَ بِكُمُ ٱلۡأَرۡضَ فَإِذَا هِيَ تَمُورُ (16) أَمۡ أَمِنتُم مَّن فِي ٱلسَّمَآءِ أَن يُرۡسِلَ عَلَيۡكُمۡ حَاصِبٗاۖ فَسَتَعۡلَمُونَ كَيۡفَ نَذِيرِ (17) وَلَقَدۡ كَذَّبَ ٱلَّذِينَ مِن قَبۡلِهِمۡ فَكَيۡفَ كَانَ نَكِيرِ (18) أَوَلَمۡ يَرَوۡاْ إِلَى ٱلطَّيۡرِ فَوۡقَهُمۡ صَٰٓفَّٰتٖ وَيَقۡبِضۡنَۚ مَا يُمۡسِكُهُنَّ إِلَّا ٱلرَّحۡمَٰنُۚ إِنَّهُۥ بِكُلِّ شَيۡءِۭ بَصِيرٌ (19) أَمَّنۡ هَٰذَا ٱلَّذِي هُوَ جُندٞ لَّكُمۡ يَنصُرُكُم مِّن دُونِ ٱلرَّحۡمَٰنِۚ إِنِ ٱلۡكَٰفِرُونَ إِلَّا فِي غُرُورٍ (20) أَمَّنۡ هَٰذَا ٱلَّذِي يَرۡزُقُكُمۡ إِنۡ أَمۡسَكَ رِزۡقَهُۥۚ بَل لَّجُّواْ فِي عُتُوّٖ وَنُفُورٍ (21) أَفَمَن يَمۡشِي مُكِبًّا عَلَىٰ وَجۡهِهِۦٓ أَهۡدَىٰٓ أَمَّن يَمۡشِي سَوِيًّا عَلَىٰ صِرَٰطٖ مُّسۡتَقِيمٖ (22) قُلۡ هُوَ ٱلَّذِيٓ أَنشَأَكُمۡ وَجَعَلَ لَكُمُ ٱلسَّمۡعَ وَٱلۡأَبۡصَٰرَ وَٱلۡأَفۡـِٔدَةَۚ قَلِيلٗا مَّا تَشۡكُرُونَ (23) قُلۡ هُوَ ٱلَّذِي ذَرَأَكُمۡ فِي ٱلۡأَرۡضِ وَإِلَيۡهِ تُحۡشَرُونَ (24) وَيَقُولُونَ مَتَىٰ هَٰذَا ٱلۡوَعۡدُ إِن كُنتُمۡ صَٰدِقِينَ (25) قُلۡ إِنَّمَا ٱلۡعِلۡمُ عِندَ ٱللَّهِ وَإِنَّمَآ أَنَا۠ نَذِيرٞ مُّبِينٞ (26) فَلَمَّا رَأَوۡهُ زُلۡفَةٗ سِيٓـَٔتۡ وُجُوهُ ٱلَّذِينَ كَفَرُواْ وَقِيلَ هَٰذَا ٱلَّذِي كُنتُم بِهِۦ تَدَّعُونَ (27) قُلۡ أَرَءَيۡتُمۡ إِنۡ أَهۡلَكَنِيَ ٱللَّهُ وَمَن مَّعِيَ أَوۡ رَحِمَنَا فَمَن يُجِيرُ ٱلۡكَٰفِرِينَ مِنۡ عَذَابٍ أَلِيمٖ (28) قُلۡ هُوَ ٱلرَّحۡمَٰنُ ءَامَنَّا بِهِۦ وَعَلَيۡهِ تَوَكَّلۡنَاۖ فَسَتَعۡلَمُونَ مَنۡ هُوَ فِي ضَلَٰلٖ مُّبِينٖ (29) قُلۡ أَرَءَيۡتُمۡ إِنۡ أَصۡبَحَ مَآؤُكُمۡ غَوۡرٗا فَمَن يَأۡتِيكُم بِمَآءٖ مَّعِينِۭ (30).", max:1}
      ]

      title: 'الأذكار اليومية',
      items: [
        {zekr:"قال رسول الله ﷺ: من قال: سبحان الله وبحمده، في يوم مائة مرة، حُطَّت خطاياه وإن كانت مثل زبد البحر.", max:100},
        {zekr:"قال رسول الله ﷺ: من قالَ حينَ يسمعُ المؤذِّنَ وأنا أشهدُ أن لا إلَهَ إلَّا اللَّهُ وحدَهُ لا شريكَ لَهُ وأشهدُ أنَّ محمَّدًا عبدُهُ ورسولُهُ رضيتُ باللَّهِ ربًّا وبالإسلامِ دينًا وبمحمَّدٍ نبيًّا غفرَ لَهُ ذنبُهُ.", max:100},
        {zekr:"قال رسول الله ﷺ: من قال خلفَ كلِّ صلاةٍ ثلاثًا وثلاثينَ تَكبيرةً وثلاثًا وثلاثينَ تحميدةً وثلاثًا وثلاثينَ تسبيحةً ويقولُ لا إلهَ إلَّا اللَّهُ وحدَه لا شريكَ لهُ لهُ الملكُ ولهُ الحمدُ وهوَ على كلِّ شيءٍ قديرٌ مرَّةً واحدةً غُفِرَ لهُ خطاياهُ وإن كانَت مثلَ زبَدِ البحرِ.", max:33},
        {zekr:"قال رسول الله ﷺ: مَنْ أكلَ طعامًا فقالَ: (الحمدُ للهِ الَّذي أطعَمَنِي هذا ورزَقنِيه مِنْ غيرِ حَولٍ مِنِّي ولا قوةٍ)؛ غُفِرَ لهُ ما تقدَّمَ مِن ذنبِه. ومَنْ لَبسَ ثوبًا فقالَ: (الحمدُ للهِ الَّذي كَسَانِي هذا ورزقنِيِه مِن غيرِ حولٍ منِّي ولا قوَّةٍ)؛ غُفِرَ لهُ ما تقدَّمَ مِنْ ذَنبِهِ.", max:1},
        {zekr:"قال رسول الله ﷺ: من قال حين يأوي إلى فراشِه: (لا إله إلا اللهُ وحده لا شريك له ، له الملكُ ، وله الحمدُ ، وهو على كلِّ شيءٍ قديرٌ ، لاحولَ ولا قوةَ إلا بالله العليِّ العظيمِ ، سبحان اللهِ، والحمدُ لله ، ولا إله إلا اللهُ ، واللهُ أكبرُ)؛ غُفِرَتْ له ذنوبُه ولو كانت مثلَ زَبَدِ البحرِ.", max:1},
        {zekr:"قال رسول الله ﷺ: من قال في يوم لا إله إلا الله وحده لا شريك له، له الملك، وله الحمد وهو على كل شيء قدير مائة مرة كانت له عدل عشر رقاب، وكتب له مائة حسنة، ومحا عنه مائة سيئة",max:1},
        {zekr:"قال رسول الله ﷺ: أحب الكلام إلى الله أربع: سبحان الله، والحمد لله، ولا إله إلا الله، والله أكبر",max:1},
        {zekr:"قال رسول الله ﷺ: من قال: سبحان الله وبحمده سبحان الله العظيم، غُرست له نخلة في الجنة",max:1},
        {zekr:"قال رسول الله ﷺ: سيد الاستغفار أن يقول العبد: اللهم أنت ربي لا إله إلا أنت، خلقتني وأنا عبدك، وأنا على عهدك ووعدك ما استطعت، أعوذ بك من شر ما صنعت، أبوء لك بنعمتك عليَّ، وأبوء بذنبي فاغفر لي؛ فإنه لا يغفر الذنوب إلا أنت.",max:1},
        {zekr:"قال رسول الله ﷺ: من صلى عليَّ واحدة صلى الله عليه بها عشرًا.", max:1},
        {zekr:"دعاء الاستقيقاظ: الحمد لله الذي أحيانًا بعد ما أماتنا وإليه النشور.", max:1},
        {zekr:"دعاء لبس الثوب: اللهم إني أسألك من خيره وخير ما هو له، وأعوذ بك من شره وشرِّ ما هو له.", max:1},
        {zekr:"دعاء دخول الخلاء: اللهم إني أعوذ بك من الخُبث والخبائث.", max:1},
        {zekr:"دعاء الخروج من الخلاء: غفرانك.", max:1},
        {zekr:"دعاء الوضوء: بسم الله.", max:1},
        {zekr:"دعاء بعد الوضوء: سبحانك اللهم وبحمْدك، أشهد أنْ لا إله إلا أنت، أستغفرك اللهم وأتوب إليك.", max:1},
        {zekr:"دعاء الخروج من المنزل: بسم الله، توكَّلت على الله، ولا حول ولا قوة إلا بالله.", max:1},
        {zekr:"دعاء الدخول إلى المنزل: بسم الله وَلَجنا، وبسم الله خرجنا، وعلى الله ربنا توكَّلنا، ثم ليسلِّم على أهله.", max:1},
        {zekr:"دعاء الخروج إلى الصلاة: اللهم اجعل في قلبي نورًا، وفي لساني نورًا، واجعل في سمعي نورًا، واجعل في بصري نورًا، واجعل من خلفي نورًا، ومن أمامي نورًا، واجعل من فوقي نورًا، ومن تحتي نورًا، اللهم أعطني نورًا.", max:1},
        {zekr:"دعاء دخول المسجد: اللهم افتح لي أبواب رحمتك، بسم الله، والصلاة والسلام على رسول الله.", max:1},
        {zekr:" دعاء الخروج من المسجد: اللهم إني أسألك من فضلك.", max:1}
      ]
    },
    prayer: {
      title: 'أذكار الصلاة',
      items: [
        {zekr: "اسْتَغْفِرُ اللَّهِ", max: 3 },
        {zekr: "اللَّهُمَّ أَنْتَ السَّلاَمُ، وَمِنْكَ السَّلاَمُ، تَبَارَكْتَ يَا ذَا الْجَلاَلِ وَالْإِكْرَامِ", max: 1 },
        {zekr: "لَا إِلَهَ إِلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْمُلْكُ، وَلَهُ الْحَمدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ. لاَ حَوْلَ وَلاَ قُوَّةَ إِلاَّ بِاللَّهِ، لاَ إِلَهَ إِلاَّ اللَّهُ، وَلاَ نَعْبُدُ إِلاَّ إِيَّاهُ, لَهُ النِّعْمَةُ وَلَهُ الْفَضْلُ وَلَهُ الثَّنَاءُ الْحَسَنُ، لَا إِلَهَ إِلاَّ اللَّهُ مُخْلِصِينَ لَهُ الدِّينَ وَلَوْ كَرِهَ الكَافِرُونَ", max: 1 },
        {zekr: "لا إلهَ إلاّ اللّهُ وحدَهُ لا شريكَ لهُ، لهُ المُـلْكُ ولهُ الحَمْد، وهوَ على كلّ شَيءٍ قَدير، اللّهُـمَّ لا مانِعَ لِما أَعْطَـيْت، وَلا مُعْطِـيَ لِما مَنَـعْت، وَلا يَنْفَـعُ ذا الجَـدِّ مِنْـكَ الجَـد", max: 1 },
        {zekr: "سُبْحَانَ اللَّهِ", max: 33 },
        {zekr: "الْحَمْدُ لِلَّهِ", max: 33 },
        {zekr: "اللَّهُ أَكْبَرُ", max: 33 },
        {zekr: "لاَ إِلَهَ إِلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ", max: 1 },
        {zekr:"قُلْ هُوَ اللَّهُ أَحَدٌ ۝ اللَّهُ الصَّمَدُ ۝ لَمْ يَلِدْ وَلَمْ يُولَدْ ۝ وَلَمْ يَكُنْ لَهُ كُفُوًا أَحَدٌ",max:1},
        {zekr:"قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ ۝ مِنْ شَرِّ مَا خَلَقَ ۝ وَمِنْ شَرِّ غَاسِقٍ إِذَا وَقَبَ ۝ وَمِنْ شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ ۝ وَمِنْ شَرِّ حَاسِدٍ إِذَا حَسَدَ",max:1},
        {zekr:"قُلْ أَعُوذُ بِرَبِّ النَّاسِ ۝ مَلِكِ النَّاسِ ۝ إِلَٰهِ النَّاسِ ۝ مِنْ شَرِّ الْوَسْوَاسِ الْخَنَّاسِ ۝ الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ ۝ مِنَ الْجِنَّةِ وَالنَّاسِ",max:1},
        {zekr:"اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَنْ ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ",max:1},
        {zekr: "لا إلهَ إلاّ اللّهُ وحْـدَهُ لا شريكَ لهُ، لهُ المُلكُ ولهُ الحَمْد، يُحيـي وَيُمـيتُ وهُوَ على كُلّ شيءٍ قدير - عشر مرات بعد المغرب والصبح.", max: 10 },
        {zekr: "اللَّهُمَّ أَجِرْنِي مِنْ النَّار - بعد المغرب والصبح.", max: 7 },
        {zekr: "اللَّهُمَّ أَعِنِّي عَلَى ذِكْرِكَ وَشُكْرِكَ وَحُسْنِ عِبَادَتِكَ", max: 1 },
        {zekr: "اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْماً نافِعاً، وَرِزْقاً طَيِّباً، وَعَمَلاً مُتَقَبَّلاً - بَعْدَ السّلامِ مِنْ صَلاَةِ الفَجْرِ.", max: 1 }
      ]
    },
    quranDua: {
      title: 'أدعية القرآن',
      items: [
        {zekr: "اهدِنَا الصِّرَاطَ المُستَقِيمَ * صِرَاطَ الَّذِينَ أَنعَمتَ عَلَيهِمْ غَيرِ المَغضُوبِ عَلَيهِمْ وَلاَ الضَّالِّينَ", max: 1 },
        {zekr: "رَبَّنَا تَقَبَّلْ مِنَّا إِنَّكَ أَنْتَ السَّمِيعُ الْعَلِيمُ", max: 1 },
        {zekr: "رَبَّنَا وَاجْعَلْنَا مُسْلِمَيْنِ لَكَ وَمِن ذُرِّيَّتِنَا أُمَّةً مُّسْلِمَةً لَّكَ وَأَرِنَا مَنَاسِكَنَا وَتُبْ عَلَيْنَآ إِنَّكَ أَنتَ التَّوَّابُ الرَّحِيمُ", max: 1 },
        {zekr: "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ", max: 1 },
        {zekr: "رَبَّنَا أَفْرِغْ عَلَيْنَا صَبْرًا وَثَبِّتْ أَقْدَامَنَا وَانصُرْنَا عَلَى الْقَوْمِ الْكَافِرِينَ", max: 1 },
        {zekr: "غُفْرَانَكَ رَبَّنَا وَإِلَيْكَ الْمَصِيرُ", max: 1 },
        {zekr: "رَبَّنَا لاَ تُؤَاخِذْنَا إِن نَّسِينَا أَوْ أَخْطَأْنَا رَبَّنَا وَلاَ تَحْمِلْ عَلَيْنَا إِصْرًا كَمَا حَمَلْتَهُ عَلَى الَّذِينَ مِن قَبْلِنَا رَبَّنَا وَلاَ تُحَمِّلْنَا مَا لاَ طَاقَةَ لَنَا بِهِ وَاعْفُ عَنَّا وَاغْفِرْ لَنَا وَارْحَمْنَا أَنتَ مَوْلاَنَا فَانصُرْنَا عَلَى الْقَوْمِ الْكَافِرِينَ", max: 1 },
        {zekr: "رَبَّنَا لاَ تُزِغْ قُلُوبَنَا بَعْدَ إِذْ هَدَيْتَنَا وَهَبْ لَنَا مِن لَّدُنكَ رَحْمَةً إِنَّكَ أَنتَ الْوَهَّابُ", max: 1 },
        {zekr: "رَبَّنَا إِنَّنَا آمَنَّا فَاغْفِرْ لَنَا ذُنُوبَنَا وَقِنَا عَذَابَ النَّارِ", max: 1 },
        {zekr: "رَبِّ هَبْ لِي مِن لَّدُنْكَ ذُرِّيَّةً طَيِّبَةً إِنَّكَ سَمِيعُ الدُّعَاء", max: 1 },
        {zekr: "رَبَّنَا آمَنَّا بِمَا أَنزَلْتَ وَاتَّبَعْنَا الرَّسُولَ فَاكْتُبْنَا مَعَ الشَّاهِدِينَ", max: 1 },
        {zekr: "رَبَّنَا اغْفِرْ لَنَا ذُنُوبَنَا وَإِسْرَافَنَا فِي أَمْرِنَا وَثَبِّتْ أَقْدَامَنَا وَانْصُرْنَا عَلَى الْقَوْمِ الْكَافِرِينَ", max: 1 },
        {zekr: "حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيلُ", max: 1 },
        {zekr: "رَبَّنَا مَا خَلَقْتَ هَذَا بَاطِلًا سُبْحَانَكَ فَقِنَا عَذَابَ النَّارِ", max: 1 },
        {zekr: "رَبَّنَا إِنَّكَ مَنْ تُدْخِلِ النَّارَ فَقَدْ أَخْزَيْتَهُ", max: 1 },
        {zekr: "رَبَّنَا إِنَّنَا سَمِعْنَا مُنَادِيًا يُنَادِي لِلْإِيمَانِ أَنْ آمِنُوا بِرَبِّكُمْ فَآمَنَّا رَبَّنَا فَاغْفِرْ لَنَا ذُنُوبَنَا وَكَفِّرْ عَنَّا سَيِّئَاتِنَا وَتَوَفَّنَا مَعَ الْأَبْرَارِ", max: 1 },
        {zekr: "رَبَّنَا وَآتِنَا مَا وَعَدْتَنَا عَلَى رُسُلِكَ وَلَا تُخْزِنَا يَوْمَ الْقِيَامَةِ إِنَّكَ لَا تُخْلِفُ الْمِيعَادَ", max: 1 },
        {zekr: "رَبَّنَا أَخْرِجْنَا مِنْ هَذِهِ الْقَرْيَةِ الظَّالِمِ أَهْلُهَا وَاجْعَلْ لَنَا مِنْ لَدُنْكَ وَلِيًّا وَاجْعَلْ لَنَا مِنْ لَدُنْكَ نَصِيرًا", max: 1 },
        {zekr: "رَبَّنَا أَنْزِلْ عَلَيْنَا مَائِدَةً مِنَ السَّمَاءِ تَكُونُ لَنَا عِيدًا", max: 1 },
        {zekr: "وَارْزُقْنَا وَأَنْتَ خَيْرُ الرَّازِقِينَ", max: 1 },
        {zekr: "رَبَّنَا ظَلَمْنَا أَنْفُسَنَا وَإِنْ لَمْ تَغْفِرْ لَنَا وَتَرْحَمْنَا لَنَكُونَنَّ مِنَ الْخَاسِرِينَ", max: 1 },
        {zekr: "رَبَّنَا لَا تَجْعَلْنَا مَعَ الْقَوْمِ الظَّالِمِينَ", max: 1 },
        {zekr: "رَبَّنَا افْتَحْ بَيْنَنَا وَبَيْنَ قَوْمِنَا بِالْحَقِّ وَأَنْتَ خَيْرُ الْفَاتِحِينَ", max: 1 },
        {zekr: "رَبَّنَا أَفْرِغْ عَلَيْنَا صَبْرًا وَتَوَفَّنَا مُسْلِمِينَ", max: 1 },
        {zekr: "فَلَا تُشْمِتْ بِيَ الْأَعْدَاءَ وَلَا تَجْعَلْنِي مَعَ الْقَوْمِ الظَّالِمِينَ", max: 1 },
        {zekr: "رَبِّ اغْفِرْ لِي وَلِأَخِي وَأَدْخِلْنَا فِي رَحْمَتِكَ وَأَنْتَ أَرْحَمُ الرَّاحِمِينَ", max: 1 },
        {zekr: "أَنْتَ وَلِيُّنَا فَاغْفِرْ لَنَا وَارْحَمْنَا وَأَنْتَ خَيْرُ الْغَافِرِينَ", max: 1 },

  // ===================== Helper Functions =====================
  function updateCities() {
    const countrySelect = document.getElementById('regCountry');
    const citySelect = document.getElementById('regCity');
    if (countrySelect && citySelect) {
      const country = countrySelect.value;
      const cities = countries[country] || ["المحافظة الرئيسية"];
      citySelect.innerHTML = cities.map(c => `<option value="${c}">${c}</option>`).join('');
    }
  }

  function updateEditCities() {
    const countrySelect = document.getElementById('editCountry');
    const citySelect = document.getElementById('editCity');
    if (countrySelect && citySelect) {
      const cities = countries[countrySelect.value] || ["المحافظة"];
      citySelect.innerHTML = cities.map(c => `<option value="${c}">${c}</option>`).join('');
      if (userData && userData.city) citySelect.value = userData.city;
    }
  }

  function convertTo12Hour(time24) {
    if (!time24) return "-";
    let [hours, minutes] = time24.split(':');
    let period = parseInt(hours) >= 12 ? 'م' : 'ص';
    let hours12 = parseInt(hours) % 12;
    hours12 = hours12 === 0 ? 12 : hours12;
    return `${hours12}:${minutes} ${period}`;
  }

  function updateProgress(type, current, total) {
    const bar = document.getElementById('topProgressContainer');
    if (!type || type === 'home') {
      if (bar) bar.style.display = 'none';
      return;
    }
    if (bar) bar.style.display = 'block';
    const percent = Math.round((current / total) * 100);
    const fill = document.getElementById('progressFill');
    const text = document.getElementById('progressText');
    const countSpan = document.getElementById('progressCount');
    if (fill) fill.style.width = percent + '%';
    if (text) text.innerHTML = `الإنجاز: ${percent}%`;
    if (countSpan) countSpan.innerHTML = `${current} / ${total}`;
  }

  function closeAllGrids() {
    const surahGrid = document.getElementById('surahGrid');
    const juzGrid = document.getElementById('juzGrid');
    const recitationGrid = document.getElementById('recitationGrid');
    if (surahGrid) surahGrid.classList.remove('show');
    if (juzGrid) juzGrid.classList.remove('show');
    if (recitationGrid) recitationGrid.classList.remove('show');
  }

  // ===================== Firebase User Functions (with Local Fallback) =====================
  function createUserInFirebase(user) {
    // حفظ محلياً
    localStorage.setItem('userPhone', user.phone);
    localStorage.setItem('userData', JSON.stringify(user));
    // محاولة الحفظ في Firebase
    return db.collection("users").doc(user.phone).set(user)
      .catch((error) => {
        console.warn("Failed to save to Firebase, saved locally only:", error);
      });
  }

  function updateUserPointsInFirebase(phone, points) {
    // تحديث البيانات محلياً أولاً
    if (userData) {
      userData.points = points;
      localStorage.setItem('userData', JSON.stringify(userData));
    }
    // محاولة التحديث في Firebase
    return db.collection("users").doc(phone).update({ points: points })
      .catch((error) => {
        console.warn("Failed to update points in Firebase, saved locally:", error);
      });
  }

  function getAllUsersFromFirebase() {
    return db.collection("users").orderBy("points", "desc").get();
  }

  function resetAllUsersPointsInFirebase() {
    return db.collection("users").get().then(snapshot => {
      const batch = db.batch();
      snapshot.forEach(doc => {
        batch.update(doc.ref, { points: 0 });
      });
      return batch.commit();
    });
  }

  // ===================== Check Existing User (with Local Fallback) =====================
  function checkExistingUser() {
    const savedPhone = localStorage.getItem('userPhone');
    if (savedPhone) {
      // أولاً: محاولة جلب البيانات من Firebase
      db.collection("users").doc(savedPhone).get()
        .then((doc) => {
          if (doc.exists) {
            userData = doc.data();
            localStorage.setItem('userData', JSON.stringify(userData));
            updateSidebarPointsDisplay();
            handleRouting();
          } else {
            // إذا لم يكن المستخدم موجوداً في Firebase، نستخدم البيانات المحلية إن وجدت
            const localData = localStorage.getItem('userData');
            if (localData) {
              userData = JSON.parse(localData);
              updateSidebarPointsDisplay();
              handleRouting();
            } else {
              localStorage.removeItem('userPhone');
              handleRouting();
            }
          }
        })
        .catch((error) => {
          console.error("Error fetching user from Firebase:", error);
          // في حالة فشل الاتصال، نستخدم البيانات المحلية
          const localData = localStorage.getItem('userData');
          if (localData) {
            userData = JSON.parse(localData);
            updateSidebarPointsDisplay();
            handleRouting();
          } else {
            localStorage.removeItem('userPhone');
            handleRouting();
          }
        });
      return true;
    }
    return false;
  }

  // ===================== Update Sidebar Points =====================
  function updateSidebarPointsDisplay() {
    if (!userData) return;
    const pointsDisplay = document.getElementById('pointsDisplayNum');
    if (pointsDisplay) {
      pointsDisplay.innerText = userData.points || 0;
    }
  }

  // ===================== Increment Points =====================
  function incrementUserPoints() {
    if (!userData || !userData.phone) return;
    userData.points = (userData.points || 0) + 1;
    localStorage.setItem('userPhone', userData.phone);
    localStorage.setItem('userData', JSON.stringify(userData));
    updateSidebarPointsDisplay();
    updateUserPointsInFirebase(userData.phone, userData.points)
      .catch(err => console.error("Error updating points:", err));
  }

  // ===================== Show Registration (with Local Check) =====================
  function showRegistration() {
    // إذا كان هناك بيانات محلية، لا تظهر صفحة التسجيل
    if (userData || localStorage.getItem('userData')) {
      handleRouting();
      return;
    }
    const overlay = document.createElement('div');
    overlay.className = 'register-overlay';
    overlay.id = 'registerOverlay';
    overlay.innerHTML = `
      <div class="register-card">
        <i class="fas fa-user-plus" style="font-size: 3rem; margin-bottom: 15px;"></i>
        <h2>مرحباً بك في منهاج المسلم</h2>
        <p style="margin-bottom: 20px;">يرجى إدخال بياناتك للمتابعة</p>
        <input type="text" id="regName" placeholder="الاسم الكامل" autocomplete="off">
        <select id="regCountry" onchange="updateCities()">
          ${Object.keys(countries).map(c => `<option value="${c}">${c}</option>`).join('')}
        </select>
        <select id="regCity"></select>
        <input type="tel" id="regPhone" placeholder="رقم الهاتف" autocomplete="off">
        <button id="registerBtn">تسجيل الدخول</button>
      </div>
    `;
    document.body.appendChild(overlay);

    const citySelect = document.getElementById('regCity');
    if (citySelect) citySelect.innerHTML = countries["مصر"].map(c => `<option value="${c}">${c}</option>`).join('');

    document.getElementById('registerBtn').onclick = () => {
      const name = document.getElementById('regName').value.trim();
      const country = document.getElementById('regCountry').value;
      const city = document.getElementById('regCity').value;
      const phone = document.getElementById('regPhone').value.trim();

      if (!name || !country || !city || !phone) {
        alert("الرجاء إدخال جميع البيانات");
        return;
      }

      const firstName = name.split(' ')[0];
      const newUser = {
        fullName: name,
        firstName: firstName,
        country: country,
        city: city,
        phone: phone,
        points: 0,
        registeredAt: new Date().toISOString()
      };

      createUserInFirebase(newUser)
        .then(() => {
          userData = newUser;
          localStorage.setItem('userPhone', userData.phone);
          localStorage.setItem('userData', JSON.stringify(userData));
          overlay.remove();
          updateSidebarPointsDisplay();
          handleRouting();
        })
        .catch((error) => {
          console.error("Error registering:", error);
          alert("حدث خطأ أثناء التسجيل، تأكد من الاتصال بالإنترنت.");
        });
    };
  }

  // ===================== Connection Status =====================
  function checkConnection() {
    const statusEl = document.getElementById('connectionStatus');
    if (!navigator.onLine) {
      if (statusEl) statusEl.style.display = 'block';
    } else {
      if (statusEl) statusEl.style.display = 'none';
      // محاولة مزامنة البيانات عند عودة الاتصال
      if (userData && userData.phone) {
        db.collection("users").doc(userData.phone).set(userData)
          .catch(err => console.warn("Sync failed:", err));
      }
    }
  }

  window.addEventListener('online', checkConnection);
  window.addEventListener('offline', checkConnection);

  // ===================== Logout Function =====================
  function logoutUser() {
    if (confirm("هل أنت متأكد من تسجيل الخروج؟")) {
      localStorage.removeItem('userPhone');
      localStorage.removeItem('userData');
      userData = null;
      window.location.hash = '#home';
      handleRouting();
    }
  }

    updateProgress('home');

    document.getElementById('app').innerHTML = `

        </h3>
        <div id="prayerTimesLoading" style="text-align:center; font-size:0.8rem; color:var(--text-muted);">
          <i class="fas fa-spinner fa-spin"></i> جاري جلب التوقيت...

  // ===================== Prayer Times =====================
  function loadPrayerTimes(forceRefresh = false) {
      const today = new Date().toDateString();
  const savedDate = localStorage.getItem('prayerDate');
  const savedTimes = localStorage.getItem('prayerTimes');

  // لو النهارده نفس اليوم والمخزن موجود => اعرض من التخزين
  if (!forceRefresh && savedDate === today && savedTimes) {
    try {
      const times = JSON.parse(savedTimes);
      displayPrayerTimes(times);
      return;
    } catch(e) {}
  }

    if (!forceRefresh && cachedPrayerTimes && lastPrayerFetchDate === today) {
      displayPrayerTimes(cachedPrayerTimes);
      return;
    }
  const loadingEl = document.getElementById('prayerTimesLoading');
  const gridEl = document.getElementById('prayerTimesGrid');
  if (loadingEl) loadingEl.style.display = 'block';
  if (gridEl) gridEl.style.display = 'none';

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=5`)
            .then(res => res.json())
            .then(data => {
              if (data && data.data && data.data.timings) {
                cachedPrayerTimes = data.data.timings;
                lastPrayerFetchDate = today;
                displayPrayerTimes(cachedPrayerTimes);
              } else {
                loadDefaultPrayerTimes();
              }
            })
            .catch(() => loadDefaultPrayerTimes());
        },
        () => loadDefaultPrayerTimes()
      );
    } else {
      loadDefaultPrayerTimes();
    }
  }

  function loadDefaultPrayerTimes() {
  fetch(`https://api.aladhan.com/v1/timings?latitude=30.0444&longitude=31.2357&method=5`)
    .then(res => res.json())
    .then(data => {
      if (data && data.data && data.data.timings) {
        const times = data.data.timings;
        const today = new Date().toDateString();
        localStorage.setItem('prayerDate', today);
        localStorage.setItem('prayerTimes', JSON.stringify(times));
        displayPrayerTimes(times);
      }
    })
    .catch(() => {
      const saved = localStorage.getItem('prayerTimes');
      if (saved) {
        try {
          displayPrayerTimes(JSON.parse(saved));
          const loadingEl = document.getElementById('prayerTimesLoading');
          if (loadingEl) {
            loadingEl.innerHTML = '⚠️ توقيت سابق (غير متصل بالإنترنت)';
            loadingEl.style.display = 'block';
            loadingEl.style.color = '#f59e0b';
          }
        } catch(e) {}
      }
    });
}

  window.updateCountSingle = function(type, index, max) {
    const countKey = `${type}_${index}`;
    if (!counts[countKey]) counts[countKey] = 0;

    if (counts[countKey] < max) {
      counts[countKey]++;

      const counterElement = document.getElementById(`zekrCounterText_${type}_${index}`);
      if (counterElement) {
        const isDone = counts[countKey] >= max;
        counterElement.innerHTML = `${counts[countKey]} / ${max} ${isDone ? '<i class="fas fa-check-circle"></i>' : ''}`;

                finalStory += `<p style="line-height:1.8; margin:10px 0; font-size:1rem;">${p}</p>`;
              }
            }
          }
        });

        formattedStory = finalStory;

  function updateDropdownsFromPage(pageNum) {
    let foundSurah = null;
    for (let i = 1; i <= 114; i++) {
      const startPage = surahStartPages[i];
      const nextStartPage = surahStartPages[i+1] || 605;
      if (pageNum >= startPage && pageNum < nextStartPage) {
        foundSurah = surahNames[i-1];
        break;
      }
    }
    if (foundSurah) {
      const surahDropdown = document.getElementById('surahDropdownText');
      if (surahDropdown) surahDropdown.innerHTML = `<i class="fas fa-list"></i> السورة: ${foundSurah}`;
    }
    for (let i = 1; i <= 30; i++) {
      const startPage = juzStartPages[i];
      const nextStartPage = juzStartPages[i+1] || 605;
      if (pageNum >= startPage && pageNum < nextStartPage) {
        const juzDropdown = document.getElementById('juzDropdownText');
        if (juzDropdown) juzDropdown.innerHTML = `<i class="fas fa-th"></i> الجزء ${i}`;
        break;
      }
    }
  }

  // ===================== Qibla =====================
  function renderQibla() {
    document.body.classList.add('compass-mode');
    const mainTitleEl = document.getElementById('mainTitle');
    if (mainTitleEl) mainTitleEl.innerHTML = '<i class="fas fa-compass"></i> بوصلة القبلة';
    const greetingEl = document.getElementById('greeting');
    if (greetingEl) greetingEl.style.display = 'none';
    if (typeof updateProgress === 'function') updateProgress('home');

    const appContainer = document.getElementById('app');
    if (!appContainer) return;

    appContainer.innerHTML = `
      <style>
        .qibla-wrapper { background: transparent; color: inherit; padding: 15px 10px; text-align: center; max-width: 380px; margin: 0 auto; }
        .qibla-status-text { font-size: 0.9rem; color: inherit; opacity: 0.9; margin-bottom: 20px; line-height: 1.5; font-weight: 600; }
        .outer-green-ring { position: relative; width: 270px; height: 270px; border: 6px solid #2ecc71; border-radius: 50%; margin: 0 auto; box-sizing: border-box; padding: 5px; background: transparent; transition: all 0.15s ease; }
        .top-fixed-indicator { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 15px solid #2ecc71; z-index: 20; }
        .compass-disc-adaptive { width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden; background: rgba(128, 128, 128, 0.08); color: inherit; border: 1px solid currentColor; opacity: 0.95; transition: transform 0.1s linear; }
        .dial-element { position: absolute; left: 50%; transform-origin: 50% 120px; font-family: sans-serif; color: inherit; }
        .dial-number { top: 8px; font-size: 0.75rem; opacity: 0.8; }
        .dial-letter { top: 28px; font-size: 1.1rem; font-weight: bold; }
        .dial-letter.letter-n { color: #e74c3c !important; }
        .dial-tick { position: absolute; top: 4px; left: 50%; width: 1.5px; height: 6px; background: currentColor; opacity: 0.4; transform-origin: 50% 120px; }
        .kaaba-pointer-container { position: absolute; top: 0; left: 50%; width: 0; height: 50%; transform-origin: bottom center; z-index: 10; }
        .kaaba-green-arrow { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 22px solid #2ecc71; }
        .kaaba-blue-badge { position: absolute; bottom: -24px; left: 50%; transform: translateX(-50%); width: 46px; height: 46px; background: #0284c7; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.4rem; border: 2px solid #ffffff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .heading-large-display { margin-top: 20px; font-size: 2.3rem; font-weight: 700; color: inherit; }
        .compass-hint-text { font-size: 0.95rem; margin-top: 8px; font-weight: 600; color: inherit; min-height: 24px; }
        .aligned-glow { border-color: #00ff00 !important; box-shadow: 0 0 25px rgba(0, 255, 0, 0.85); }
        .aligned-arrow { border-bottom-color: #00ff00 !important; }
      </style>
      <div class="qibla-wrapper">
        <div id="qiblaStatus" class="qibla-status-text">🧭 جاري حساب اتجاه القبلة الدقيق لموقعك...</div>
        <div id="outerRing" class="outer-green-ring">
          <div id="topTriangle" class="top-fixed-indicator"></div>
          <div id="compassDisc" class="compass-disc-adaptive">
            <div id="kaabaPointer" class="kaaba-pointer-container">
              <div class="kaaba-green-arrow"></div>
              <div class="kaaba-blue-badge">🕋</div>
            </div>
          </div>
        </div>
        <div class="heading-large-display" dir="ltr"><span id="headingAngleText">0° N</span></div>
        <div id="compassHint" class="compass-hint-text">🔄 ضع الهاتف بشكل مسطح وأدره ببطء</div>
        <a href="#home" class="btn-unified btn-small" style="margin-top:25px; display:inline-block;"><i class="fas fa-home"></i> الرئيسية</a>
      </div>
    `;

    window.isVibrationUnlocked = false;
    const silentUnlock = () => {
      if (!window.isVibrationUnlocked) {
        if (navigator.vibrate) navigator.vibrate(5);
        window.isVibrationUnlocked = true;
      }
      document.removeEventListener('click', silentUnlock);
      document.removeEventListener('touchstart', silentUnlock);
    };
    document.addEventListener('click', silentUnlock);
    document.addEventListener('touchstart', silentUnlock);

    const disc = document.getElementById('compassDisc');
    if (disc) {
      let discContent = disc.innerHTML;
      const numbers = [0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330];
      numbers.forEach(angle => {
        discContent += `<div class="dial-element dial-number" style="transform: translateX(-50%) rotate(${angle}deg);">${angle}</div>`;
      });
      discContent += `<div class="dial-element dial-letter letter-n" style="transform: translateX(-50%) rotate(0deg);">N</div>`;
      discContent += `<div class="dial-element dial-letter" style="transform: translateX(-50%) rotate(90deg);">E</div>`;
      discContent += `<div class="dial-element dial-letter" style="transform: translateX(-50%) rotate(180deg);">S</div>`;
      discContent += `<div class="dial-element dial-letter" style="transform: translateX(-50%) rotate(270deg);">W</div>`;
      for (let t = 0; t < 360; t += 10) {
        if (t % 30 !== 0) {
          discContent += `<div class="dial-tick" style="transform: translateX(-50%) rotate(${t}deg);"></div>`;
        }
      }
      disc.innerHTML = discContent;
    }

    if (typeof calculateQiblaAngle !== 'function') {
      window.calculateQiblaAngle = function(lat, lon) {
        const kaabaLat = 21.422487, kaabaLon = 39.826206;
        const latRad = lat * (Math.PI / 180), lonRad = lon * (Math.PI / 180);
        const kaabaLatRad = kaabaLat * (Math.PI / 180), kaabaLonRad = kaabaLon * (Math.PI / 180);
        const y = Math.sin(kaabaLonRad - lonRad);
        const x = Math.cos(latRad) * Math.tan(kaabaLatRad) - Math.sin(latRad) * Math.cos(kaabaLonRad - lonRad);
        let qibla = Math.atan2(y, x) * (180 / Math.PI);
        return (qibla + 360) % 360;
      };
    }

    function getDirectionText(heading) {
      const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW', 'N'];
      return directions[Math.round(heading / 45) % 8];
    }

    window.currentTrueQiblaAngle = 135.5;
    activateCompassSensors();

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          window.currentTrueQiblaAngle = calculateQiblaAngle(lat, lon);
          const statusEl = document.getElementById('qiblaStatus');
          if (statusEl) statusEl.innerHTML = `📍 تم تحديد موقعك الدقيق بالـ GPS<br>🎯 اتجاه القبلة هنا: <strong>${Math.round(window.currentTrueQiblaAngle)}°</strong>`;
        },
        (err) => {
          const statusEl = document.getElementById('qiblaStatus');
          if (statusEl) statusEl.innerHTML = '🧭 يعمل بالزاوية الافتراضية للبلاد العربية (يرجى السماح بالـ GPS لدقة محكمة)';
        },
        { enableHighAccuracy: true, timeout: 6000 }
      );
    }

    function activateCompassSensors() {
      if (window.compassHandler) {
        window.removeEventListener('deviceorientationabsolute', window.compassHandler);
        window.removeEventListener('deviceorientation', window.compassHandler);
      }
      let insideCorrectZone = false;

      window.compassHandler = function(event) {
        let heading = null;
        if (event.webkitCompassHeading !== undefined) {
          heading = event.webkitCompassHeading;
        } else if (event.alpha !== null) {
          heading = 360 - event.alpha;
        }

        if (heading !== null) {
          const discEl = document.getElementById('compassDisc');
          if (discEl) discEl.style.transform = `rotate(${-heading}deg)`;
          const kaabaPointer = document.getElementById('kaabaPointer');
          if (kaabaPointer) kaabaPointer.style.transform = `rotate(${window.currentTrueQiblaAngle}deg)`;
          const headingTextEl = document.getElementById('headingAngleText');
          if (headingTextEl) headingTextEl.innerText = `${Math.round(heading)}° ${getDirectionText(heading)}`;

          let diff = Math.abs(heading - window.currentTrueQiblaAngle);
          if (diff > 180) diff = 360 - diff;
          const isAligned = diff <= 5;

          const outerRing = document.getElementById('outerRing');
          const topTriangle = document.getElementById('topTriangle');
          const hintSpan = document.getElementById('compassHint');

          if (isAligned) {
            if (outerRing) outerRing.classList.add('aligned-glow');
            if (topTriangle) topTriangle.classList.add('aligned-arrow');
            if (hintSpan) {
              hintSpan.innerHTML = '✅ اتجاه القبلة صحيح تماماً الآن';
              hintSpan.style.color = '#00ff00';
            }
            if (!insideCorrectZone) {
              if (navigator.vibrate) navigator.vibrate(300);
              insideCorrectZone = true;
            }
          } else {
            if (outerRing) outerRing.classList.remove('aligned-glow');
            if (topTriangle) topTriangle.classList.remove('aligned-arrow');
            if (hintSpan) {
              hintSpan.innerHTML = '🔄 أدر الهاتف ببطء حتى يضيء الإطار بالأخضر';
              hintSpan.style.color = 'inherit';
            }
            insideCorrectZone = false;
          }
        }
      };

      if ('ondeviceorientationabsolute' in window) {
        window.addEventListener('deviceorientationabsolute', window.compassHandler, true);
      } else {
        window.addEventListener('deviceorientation', window.compassHandler, true);
      }
    }
  }

  // ===================== Theme =====================
  function toggleTheme() {
    const body = document.body;
    if (!body.classList.contains('dark') && !body.classList.contains('reading')) {
      body.classList.add('dark');
      localStorage.setItem('appTheme', 'dark');
    } else if (body.classList.contains('dark')) {
      body.classList.remove('dark');
      body.classList.add('reading');
      localStorage.setItem('appTheme', 'reading');
    } else {
      body.classList.remove('reading');
      localStorage.setItem('appTheme', 'light');
    }
    const icon = document.querySelector('#headerThemeBtn i');
    if (body.classList.contains('dark')) icon.className = 'fas fa-moon';
    else if (body.classList.contains('reading')) icon.className = 'fas fa-book-open';
    else icon.className = 'fas fa-sun';
  }

  // ===================== Routing =====================
  function handleRouting() {
    // إذا لم يكن userData موجوداً، نحاول قراءته من localStorage
    if (!userData) {
      const localData = localStorage.getItem('userData');
      if (localData) {
        userData = JSON.parse(localData);
      }
    }

    if (!userData && window.location.hash !== '#admin') {
      showRegistration();
      return;
    }

    const hash = window.location.hash || '#home';
    document.body.classList.remove('azkar-mode');

    if (hash === '#home') {
      renderHome();
    } else if (hash === '#azkar') {
      renderAzkarList();
    } else if (hash === '#tasbeeh') {
      renderTasbeeh();
    } else if (hash === '#prophets') {
      renderProphets();
    } else if (hash === '#quran_main') {
      renderQuranMain();
    } else if (hash === '#qibla') {
      renderQibla();
    } else if (hash === '#settings') {
      renderSettings();
    } else if (hash === '#admin') {
      showAdminPanel();
    } else {
      const type = hash.replace('#', '');
      if (azkarList[type]) {
        renderAzkar(type, azkarList[type]);
      } else {
        renderHome();
      }
    }
    document.getElementById('sidebar').classList.remove('open');
    updateSidebarPointsDisplay();
  }

        adminAuthenticated = true;
        showAdminPanel();
        window.location.hash = '#admin';
      } else {
        alert("كلمة المرور غير صحيحة");
      }
    } else {
      showAdminPanel();
      window.location.hash = '#admin';
    }
  });

  document.querySelectorAll('.sidebar a[href]').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const href = link.getAttribute('href');
      if (href) {
        window.location.hash = href;
        document.getElementById('sidebar').classList.remove('open');
      }
    });
  });

  document.addEventListener('touchmove', function(e) {
    if (document.body.classList.contains('compass-mode')) {
      e.preventDefault();
    }
  }, { passive: false });

  // ===================== Initialize App =====================
  // Load theme from localStorage
  const savedTheme = localStorage.getItem('appTheme');
  if (savedTheme === 'dark') document.body.classList.add('dark');
  else if (savedTheme === 'reading') document.body.classList.add('reading');

  // Load tasbeeh from localStorage
  const savedTasbeeh = localStorage.getItem('tasbeehCount');
  if (savedTasbeeh !== null) {
    counts.tasbeeh = parseInt(savedTasbeeh) || 0;
  }

  // Check connection status
  checkConnection();

  // Check if user already exists
  if (!checkExistingUser()) {
    handleRouting();
  }

  // Setup window functions for global access
  window.updateCities = updateCities;
  window.updateEditCities = updateEditCities;
  window.toggleTheme = toggleTheme;
  window.handleRouting = handleRouting;
  window.renderHome = renderHome;
  window.renderQuranMain = renderQuranMain;
  window.showAdminPanel = showAdminPanel;
  window.resetAllUsersPoints = resetAllUsersPoints;
  window.incrementUserPoints = incrementUserPoints;
  window.updateSidebarPointsDisplay = updateSidebarPointsDisplay;
  window.logoutUser = logoutUser;

  // Listen for hash changes
  window.addEventListener('hashchange', handleRouting);

</script>
</body>
</html>
