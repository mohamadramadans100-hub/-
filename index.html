    /* ====== إظهار الصورة في الصفحة الرئيسية ====== */
 .home-header-wrapper {
   position: relative;
 }

 .header-banner {
   display: none;
   position: relative;
   width: calc(100% - 40px);
   margin: 0 auto;
   border-radius: 26px;
   overflow: hidden;
   box-shadow: 0 10px 25px rgba(0,0,0,0.15);
 }

 .header-banner-img {
   width: 100%;
   height: auto;
   display: block;
 }

 .header-banner::after {
   content: '';
   position: absolute;
   inset: 0;
   background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.18) 100%);
   pointer-events: none;
 }

 /* إظهار الصورة فقط في الصفحة الرئيسية */
body.page-home .header-banner {
  display: none;
}

 /* تنسيق العنوان فوق الصورة */
 body.page-home .main-header {
  position: static;
  padding: 20px;
  text-align: center;
}

 body.dark .header-banner {
   box-shadow: 0 10px 25px rgba(0,0,0,0.5);
 }

   background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.5) 100%);
 }

 body.dark body.page-home .main-header h1 {
   text-shadow: 0 0 15px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.8);
 }

   text-shadow: 0 0 10px rgba(0,0,0,0.9), 0 0 5px rgba(0,0,0,0.8);

           .mushaf-fullscreen {

           }

             position: absolute;

             font-size: 1rem;
             font-weight: bold;
             cursor: pointer;
             backdrop-filter: blur(10px);

              ====== CSS جديد لصفحة الأذان ======

           /* تصميم بطاقة الأذان */
           .athan-card {
             background: linear-gradient(135deg, #f0fdf4, #dcfce7);
             border-radius: 28px;
             padding: 1.8rem;
             margin-bottom: 20px;
             box-shadow: 0 10px 25px rgba(0,0,0,0.04);
             position: relative;
             border: 2px solid var(--primary-color);
           }
           body.dark .athan-card {
             background: linear-gradient(135deg, #1e293b, #0f172a);
             border-color: #2ecc71;
           }
           .athan-card .athan-header {
             text-align: center;
             margin-bottom: 25px;
           }
           .athan-card .athan-header h2 {
             color: var(--primary-dark);
             font-size: 1.8rem;
             margin-bottom: 5px;
           }
           body.dark .athan-card .athan-header h2 {
             color: #34d399;
           }
           .athan-card .athan-header p {
             color: var(--text-muted);
             font-size: 0.9rem;
           }
           body.dark .athan-card .athan-header p {
             color: #94a3b8;
           }

           /* كل صلاة في الأذان */
           .athan-prayer-item {
             display: flex;
             flex-direction: column;
             align-items: stretch;
             padding: 16px 20px;
             margin-bottom: 16px;
             background: var(--bg-light);
             border-radius: 20px;
             border-right: 4px solid var(--primary-color);
             transition: all 0.3s ease;
             gap: 12px;
           }
           body.dark .athan-prayer-item {
             background: #1e293b;
             border-color: #2ecc71;
           }
           /* الصف العلوي: الاسم + الوقت + زر التشغيل */
           .athan-prayer-row {
             display: flex;
             align-items: center;
             justify-content: space-between;
             gap: 12px;
             flex-wrap: wrap;
           }
           .athan-prayer-info {
             display: flex;
             align-items: center;
             gap: 12px;
             flex: 1;
             min-width: 140px;
           }
           .athan-prayer-icon {
             width: 44px;
             height: 44px;
             border-radius: 50%;
             display: flex;
             align-items: center;
             justify-content: center;
             font-size: 1.2rem;
             background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
             color: white;
             flex-shrink: 0;
           }
           body.dark .athan-prayer-icon {
             background: linear-gradient(135deg, #2ecc71, #059669);
           }
           .athan-prayer-name {
             font-weight: 700;
             font-size: 1rem;
             color: var(--text-dark);
           }
           body.dark .athan-prayer-name {
             color: #f8fafc;
           }
           .athan-prayer-time {
             font-size: 0.85rem;
             color: var(--text-muted);
             font-weight: 500;
           }
           body.dark .athan-prayer-time {
             color: #94a3b8;
           }

           /* زر تشغيل الأذان */
           .athan-play-btn {
             width: 44px;
             height: 44px;
             border-radius: 50%;
             border: none;
             cursor: pointer;
             font-size: 1rem;
             display: flex;
             align-items: center;
             justify-content: center;
             transition: all 0.3s ease;
             background: var(--primary-color);
             color: white;
             flex-shrink: 0;
           }
           .athan-play-btn:active {
             transform: scale(0.92);
           }
           .athan-play-btn.playing {
             background: #ef4444;
             animation: pulse-red 0.8s ease-in-out infinite alternate;
           }
           body.dark .athan-play-btn {
             background: #2ecc71;
           }
           body.dark .athan-play-btn.playing {
             background: #dc2626;
           }

           @keyframes pulse-red {
             0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); transform: scale(1); }
             100% { box-shadow: 0 0 20px 8px rgba(239, 68, 68, 0.2); transform: scale(1.05); }
           }

           /* المؤقت التنازلي */
           .athan-countdown {
             display: flex;
             align-items: center;
             justify-content: center;
             gap: 6px;
             font-size: 0.9rem;
             font-weight: 700;
             color: var(--primary-dark);
             background: rgba(16, 185, 129, 0.1);
             padding: 4px 12px;
             border-radius: 30px;
             border: 1px solid rgba(16, 185, 129, 0.3);
             min-width: 80px;
             text-align: center;
             font-family: 'Inter', monospace;
           }
           body.dark .athan-countdown {
             color: #34d399;
             background: rgba(46, 204, 113, 0.1);
             border-color: rgba(46, 204, 113, 0.3);
           }
           .athan-countdown .countdown-unit {
             font-size: 0.6rem;
             opacity: 0.7;
             font-weight: 400;
             margin: 0 1px;
           }

           /* صف اختيار المؤذن لكل صلاة */
           .athan-muadhin-row {
             display: flex;
             align-items: center;
             gap: 10px;
             flex-wrap: wrap;
             padding-top: 8px;
             border-top: 1px dashed rgba(0,0,0,0.08);
           }
           body.dark .athan-muadhin-row {
             border-top-color: rgba(255,255,255,0.08);
           }
           .athan-muadhin-row label {
             font-size: 0.75rem;
             font-weight: 600;
             color: var(--text-muted);
             min-width: 60px;
           }
           body.dark .athan-muadhin-row label {
             color: #94a3b8;
           }
           .athan-muadhin-row select {
             flex: 1;
             min-width: 120px;
             padding: 6px 10px;
             border-radius: 30px;
             border: 1px solid var(--primary-color);
             background: white;
             font-size: 0.8rem;
             font-weight: 500;
             cursor: pointer;
             outline: none;
             font-family: inherit;
           }
           body.dark .athan-muadhin-row select {
             background: #334155;
             border-color: #2ecc71;
             color: white;
           }

           /* مؤقت الصفحة الرئيسية */
           .athan-prayer-item .countdown-preview {
             display: flex;
             align-items: center;
             gap: 8px;
             font-size: 0.8rem;
             font-weight: 600;
             color: var(--text-muted);
           }
           body.dark .athan-prayer-item .countdown-preview {
             color: #94a3b8;
           }

           /* زر تفعيل الأذان لكل صلاة (مضيء ومتحرك) */
           .athan-toggle-prayer-btn {
             padding: 6px 14px;
             border-radius: 30px;
             border: 2px solid var(--primary-color);
             background: transparent;
             color: var(--primary-dark);
             font-size: 0.7rem;
             font-weight: 700;
             cursor: pointer;
             transition: all 0.3s ease;
             display: inline-flex;
             align-items: center;
             gap: 6px;
           }
           body.dark .athan-toggle-prayer-btn {
             color: #34d399;
             border-color: #2ecc71;
           }
           .athan-toggle-prayer-btn.active {
             background: var(--primary-color);
             color: white;
             animation: glow-pulse 1.2s ease-in-out infinite alternate;
             border-color: var(--primary-color);
           }
           body.dark .athan-toggle-prayer-btn.active {
             background: #2ecc71;
             color: #0f172a;
           }
           @keyframes glow-pulse {
             0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); transform: scale(1); }
             100% { box-shadow: 0 0 20px 6px rgba(16, 185, 129, 0.2); transform: scale(1.04); }
           }

           /* عند تفعيل الأذان لصلاة معينة */
           .athan-prayer-item.athan-active {
             background: #d1fae5;
             border-color: #059669;
             border-width: 3px;
           }
           body.dark .athan-prayer-item.athan-active {
             background: #065f46;
             border-color: #34d399;
           }

           /* حالة عدم وجود اتصال */
           .offline-badge {
             display: inline-block;
             padding: 2px 10px;
             border-radius: 20px;
             font-size: 0.65rem;
             font-weight: 700;
             background: #fef3c7;
             color: #92400e;
           }
           body.dark .offline-badge {
             background: #78350f;
             color: #fbbf24;
           }

  // ===================== Helper Functions =====================
  function updateCities() {
    const countrySelect = document.getElementById('regCountry');
    const citySelect = document.getElementById('regCity');
    if (!countrySelect || !citySelect) return;
    const country = countrySelect.value;
    if (country && countries[country]) {
      citySelect.innerHTML = `<option value="">اختر المحافظة</option>` +
        countries[country].map(c => `<option value="${c}">${c}</option>`).join('');
      citySelect.disabled = false;
    } else {
      citySelect.innerHTML = `<option value="">اختر المحافظة</option>`;
      citySelect.disabled = true;
    }
  }

  function updateEditCities() {
    const countrySelect = document.getElementById('editCountry');
    const citySelect = document.getElementById('editCity');
    if (countrySelect && citySelect) {
      const cities = countries[countrySelect.value] || ["المحافظة"];
      citySelect.innerHTML = cities.map(c => `<option value="${c}">${c}</option>`).join('');
      if (userData && userData.city) citySelect.value = userData.city;
    }
  }

  function convertTo12Hour(time24) {
    if (!time24) return "-";
    let [hours, minutes] = time24.split(':');
    let period = parseInt(hours) >= 12 ? 'م' : 'ص';
    let hours12 = parseInt(hours) % 12;
    hours12 = hours12 === 0 ? 12 : hours12;
    return `${hours12}:${minutes} ${period}`;
  }

  function updateProgress(type, current, total) {
    const bar = document.getElementById('topProgressContainer');
    if (!type || type === 'home') {
      if (bar) bar.style.display = 'none';
      return;
    }
    if (bar) bar.style.display = 'block';
    const percent = Math.round((current / total) * 100);
    const fill = document.getElementById('progressFill');
    const text = document.getElementById('progressText');
    const countSpan = document.getElementById('progressCount');
    if (fill) fill.style.width = percent + '%';
    if (text) text.innerHTML = `الإنجاز: ${percent}%`;
    if (countSpan) countSpan.innerHTML = `${current} / ${total}`;
  }

  function closeAllGrids() {
    const surahGrid = document.getElementById('surahGrid');
    const juzGrid = document.getElementById('juzGrid');
    const recitationGrid = document.getElementById('recitationGrid');
    if (surahGrid) surahGrid.classList.remove('show');
    if (juzGrid) juzGrid.classList.remove('show');
    if (recitationGrid) recitationGrid.classList.remove('show');
  }

  // ===================== Firebase User Functions =====================
  function createUserInFirebase(user) {
    localStorage.setItem('userPhone', user.phone);
    localStorage.setItem('userData', JSON.stringify(user));
    return db.collection("users").doc(user.phone).set(user)
      .catch((error) => console.warn("Failed to save to Firebase:", error));
  }

  function updateUserPointsInFirebase(phone, points) {
    if (userData) {
      userData.points = points;
      localStorage.setItem('userData', JSON.stringify(userData));
    }
    return db.collection("users").doc(phone).update({ points: points })
      .catch((error) => console.warn("Failed to update points:", error));
  }

  function getAllUsersFromFirebase() {
    return db.collection("users").orderBy("points", "desc").get();
  }

  function resetAllUsersPointsInFirebase() {
    return db.collection("users").get().then(snapshot => {
      const batch = db.batch();
      snapshot.forEach(doc => {
        batch.update(doc.ref, { points: 0 });
      });
      return batch.commit();
    });
  }

  // ===================== Check Existing User =====================
  function checkExistingUser() {
    const savedPhone = localStorage.getItem('userPhone');
    const savedUserData = localStorage.getItem('userData');

    if (savedPhone) {
      // اعرض البيانات المحفوظة فورًا من غير انتظار الشبكة خالص
      if (savedUserData) {
        try {
          userData = JSON.parse(savedUserData);
        } catch(e) {}
      }
      handleRouting();

      // حاول تحديث البيانات من فايربيز بصمت في الخلفية (لو فيه نت)
      if (navigator.onLine) {
        db.collection("users").doc(savedPhone).get()
          .then((doc) => {
            if (doc.exists) {
              userData = doc.data();
              localStorage.setItem('userPhone', userData.phone);
              localStorage.setItem('userData', JSON.stringify(userData));
              updateSidebarPointsDisplay();
            }
          })
          .catch(() => {});
      }
      return true;
    }
    return false;
  }

  // ===================== Update Sidebar Points =====================
  function updateSidebarPointsDisplay() {
    if (!userData) return;
    const pointsDisplay = document.getElementById('pointsDisplayNum');
    if (pointsDisplay) {
      pointsDisplay.innerText = userData.points || 0;
    }
  }

  // ===================== Increment Points =====================
  function incrementUserPoints() {
    if (!userData || !userData.phone) return;
    userData.points = (userData.points || 0) + 1;
    localStorage.setItem('userPhone', userData.phone);
    localStorage.setItem('userData', JSON.stringify(userData));
    updateSidebarPointsDisplay();
    updateUserPointsInFirebase(userData.phone, userData.points)
      .catch(err => console.error("Error updating points:", err));
  }

        updateSidebarPointsDisplay();
        handleRouting();

          <div style="position:relative; margin-bottom:12px;">
            <select id="regCountry" onchange="updateCities()" style="width:100%; padding:14px 45px 14px 14px; border-radius:50px; border:none; font-size:1rem; text-align:right; appearance:none; background:rgba(255,255,255,0.12); color:white; outline:none; cursor:pointer; box-sizing:border-box;">

        </p>

        <div id="errorMessage" style="display:none; margin-top:15px; padding:12px; border-radius:12px; font-size:0.9rem; text-align:right;"></div>
      </div>
    `;
    document.body.appendChild(overlay);

    const citySelect = document.getElementById('regCity');
    if (citySelect) {
      citySelect.innerHTML = `<option value="" disabled selected style="color:#999;">اختر المحافظة</option>`;
    }

    let isLoginMode = false;

    const regTitle = document.getElementById('regTitle');
    const regSubtitle = document.getElementById('regSubtitle');
    const regBtn = document.getElementById('registerBtn');
    const switchText = document.getElementById('switchText');
    const switchLink = document.getElementById('switchLink');
    const regName = document.getElementById('regName');
    const regPhone = document.getElementById('regPhone');
    const regCountry = document.getElementById('regCountry');
    const regCity = document.getElementById('regCity');
    const errorDiv = document.getElementById('errorMessage');

    function showError(message, isSuccess = false) {
      errorDiv.style.display = 'block';
      errorDiv.textContent = message;
      if (isSuccess) {
        errorDiv.style.background = 'rgba(16, 185, 129, 0.2)';
        errorDiv.style.color = '#10b981';
        errorDiv.style.border = '1px solid #10b981';
      } else {
        errorDiv.style.background = 'rgba(239, 68, 68, 0.2)';
        errorDiv.style.color = '#f87171';
        errorDiv.style.border = '1px solid #ef4444';
      }
      setTimeout(() => { errorDiv.style.display = 'none'; }, 5000);
    }

    function setLoginMode() {
      isLoginMode = true;
      regTitle.textContent = 'منهاج المسلم';
      regSubtitle.textContent = '🔐 أدخل رقم هاتفك فقط لتسجيل الدخول';
      regBtn.textContent = 'تسجيل دخول';
      switchText.innerHTML = 'ليس لديك حساب؟ <span id="switchLink" style="color:#10b981; cursor:pointer; font-weight:bold;">إنشاء حساب جديد</span>';
      document.getElementById('switchLink').onclick = setRegisterMode;
      regName.style.display = 'none';
      errorDiv.style.display = 'none';
    }

    function setRegisterMode() {
      isLoginMode = false;
      regTitle.textContent = 'منهاج المسلم';
      regSubtitle.textContent = 'سجل حسابك الجديد';
      regBtn.textContent = 'إنشاء حساب جديد';
      switchText.innerHTML = 'لديك حساب؟ <span id="switchLink" style="color:#10b981; cursor:pointer; font-weight:bold;">تسجيل الدخول</span>';

      regName.style.display = 'block';
      errorDiv.style.display = 'none';
    }

    switchLink.onclick = setLoginMode;

    window.updateCities = function() {
      const country = document.getElementById('regCountry').value;
      const citySelect = document.getElementById('regCity');
      if (country && countries[country]) {
        citySelect.innerHTML = `<option value="" disabled selected style="color:#999;">اختر المحافظة</option>` +
          countries[country].map(c => `<option value="${c}" style="color:#333;">${c}</option>`).join('');

      } else {
        citySelect.innerHTML = `<option value="" disabled selected style="color:#999;">اختر المحافظة</option>`;
        citySelect.disabled = true;
      }
    };

    document.getElementById('registerBtn').onclick = function() {
      const name = document.getElementById('regName').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const country = document.getElementById('regCountry').value;
      const city = document.getElementById('regCity').value;

      if (!phone) {
        showError('⚠️ الرجاء إدخال رقم الهاتف');
        return;
      }

      if (!country) {
        showError('⚠️ الرجاء اختيار الدولة');
        return;
      }

      if (!city) {
        showError('⚠️ الرجاء اختيار المحافظة');
        return;
      }

      db.collection("users").doc(phone).get()
        .then(function(doc) {
          if (doc.exists) {
            if (isLoginMode) {
              const userDataFromDB = doc.data();
              if (userDataFromDB.country !== country) {
                showError('⚠️ الدولة غير مطابقة للبيانات المسجلة!');
                return;
              }
              if (userDataFromDB.city !== city) {
                showError('⚠️ المحافظة غير مطابقة للبيانات المسجلة!');
                return;
              }

              userData = userDataFromDB;
              localStorage.setItem('userPhone', userData.phone);
              localStorage.setItem('userData', JSON.stringify(userData));
              overlay.remove();
              updateSidebarPointsDisplay();
              handleRouting();
            } else {
              showError('⚠️ هذا الرقم مسجل بالفعل! يرجى تسجيل الدخول.');
              setLoginMode();
            }
          } else {
            if (isLoginMode) {
              showError('❌ هذا الرقم غير مسجل! يرجى إنشاء حساب جديد.');
              setRegisterMode();
            } else {
              if (!name) {
                showError('⚠️ الرجاء إدخال الاسم الكامل');
                return;
              }

              const firstName = name.split(' ')[0];
              const newUser = {
                fullName: name,
                firstName: firstName,
                country: country,
                city: city,
                phone: phone,
                points: 0,
                registeredAt: new Date().toISOString()
              };

              db.collection("users").doc(phone).set(newUser)
                .then(function() {
                  userData = newUser;
                  localStorage.setItem('userPhone', userData.phone);
                  localStorage.setItem('userData', JSON.stringify(userData));
                  overlay.remove();
                  updateSidebarPointsDisplay();
                  handleRouting();
                })
                .catch(function(error) {
                  showError('❌ حدث خطأ أثناء التسجيل، تأكد من الاتصال بالإنترنت.');
                });
            }
          }
        })
        .catch(function(error) {
          showError('❌ حدث خطأ في الاتصال، تأكد من الإنترنت.');
        });
    };
  }

  // ===================== Connection Status =====================
  function checkConnection() {
    const statusEl = document.getElementById('connectionStatus');
    if (!navigator.onLine) {
      if (statusEl) statusEl.style.display = 'block';
    } else {
      if (statusEl) statusEl.style.display = 'none';
      if (userData && userData.phone) {
        db.collection("users").doc(userData.phone).set(userData)
          .catch(err => console.warn("Sync failed:", err));
      }
    }
  }

  window.addEventListener('online', checkConnection);
  window.addEventListener('offline', checkConnection);

  // ===================== Logout Function =====================
  function logoutUser() {
    if (confirm("هل أنت متأكد من تسجيل الخروج؟")) {
      localStorage.removeItem('userPhone');
      localStorage.removeItem('userData');
      userData = null;
      window.location.hash = '#home';
      handleRouting();
    }
  }

// دالة رئيسية لتحميل وعرض مواقيت الصلاة
function loadPrayerTimes(forceRefresh = false) {
    const today = new Date().toDateString();

    // 1. عرض التوقيت المخزن فوراً (حتى لو كان قديماً) لضمان سرعة الفتح
    const savedData = localStorage.getItem('prayerTimesData');
    if (savedData) {
        try {
            const parsed = JSON.parse(savedData);
            if (parsed.timings) {
                // ✅ عرض في الواجهة فقط دون جدولة الأندرويد الآن لتجنب المواعيد القديمة (Race Condition)
                displayPrayerTimes(parsed.timings, false);
            }
        } catch (e) {}
    }

    // 2. إذا كان المستخدم متصلاً بالإنترنت، حاول تحديث التوقيت في الخلفية
    if (navigator.onLine) {
        const lastFetch = localStorage.getItem('lastPrayerFetchTime');
        const now = Date.now();
        const tenMinutes = 10 * 60 * 1000;
        const shouldRefresh = forceRefresh || !lastFetch || (now - parseInt(lastFetch) > tenMinutes);

        if (shouldRefresh) {
            fetchFreshPrayerTimesAsync();
        } else if (savedData) {
            // ✅ إذا كانت البيانات حديثة جداً، يمكننا جدولتها للأندرويد بأمان
            try {
                const parsed = JSON.parse(savedData);
                if (parsed.timings) displayPrayerTimes(parsed.timings, true);
            } catch(e) {}
        }
    } else if (savedData) {
        // 3. وضع غير متصل: نعرض رسالة ونجدول بالبيانات المتاحة كحل أخير
        showOfflineNotice();
        try {
            const parsed = JSON.parse(savedData);
            if (parsed.timings) displayPrayerTimes(parsed.timings, true);
        } catch(e) {}
    }
}

// دالة لجلب البيانات بشكل غير متزامن (في الخلفية)
function fetchFreshPrayerTimesAsync() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                localStorage.setItem('lastKnownLocation', JSON.stringify({ lat, lon }));
                fetchPrayerTimesFromAPI(lat, lon);
            },
            () => {
                // ✅ إذا فشل الـ GPS، نحاول استخدام الموقع المحفوظ سابقاً فقط
                // لا نستخدم موقع القاهرة الافتراضي إلا كملجأ أخير جداً لو مفيش أي بيانات
                const fallback = getFallbackLocation();
                if (fallback) {
                    fetchPrayerTimesFromAPI(fallback[0], fallback[1]);
                }
            },
            { enableHighAccuracy: true, timeout: 10000 } // ✅ زيادة المهلة لـ 10 ثوانٍ لدقة أفضل
        );
    } else {
        const fallback = getFallbackLocation();
        if (fallback) fetchPrayerTimesFromAPI(fallback[0], fallback[1]);
    }
}

function getFallbackLocation() {
    const saved = localStorage.getItem('lastKnownLocation');
    if (saved) {
        try {
            const loc = JSON.parse(saved);
            if (loc && typeof loc.lat === 'number' && typeof loc.lon === 'number') {
                return [loc.lat, loc.lon];
            }
        } catch(e) {}
    }

    // ✅ إذا لم يوجد موقع محفوظ، نتحقق إذا كان لدينا مواقيت صلاة مخزنة بالفعل اليوم
    const savedData = localStorage.getItem('prayerTimesData');
    if (savedData) {
        // لو عندنا مواقيت صلاة، مش لازم نحدث بموقع القاهرة الغلط
        return null;
    }

    // موقع افتراضي أخير (القاهرة) فقط لو مفيش أي بيانات إطلاقاً
    return [30.0444, 31.2357];
}

// دالة الاتصال بالـ API وحفظ النتيجة
function fetchPrayerTimesFromAPI(lat, lon) {
    const url = `https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=5`;

    fetch(url)
        .then(response => response.json())
        .then(data => {
            if (data && data.data && data.data.timings) {
                const timings = data.data.timings;
                const today = new Date().toDateString();

                // حفظ البيانات مع تاريخ اليوم
                const dataToStore = {
                    date: today,
                    timings: timings
                };
                localStorage.setItem('prayerTimesData', JSON.stringify(dataToStore));
                localStorage.setItem('prayerDate', today);
                localStorage.setItem('lastPrayerFetchTime', String(Date.now()));

                // ✅ تحديث العرض والجدولة (بيانات حديثة وموثوقة)
                displayPrayerTimes(timings, true);
                removeOfflineNotice();

                // تحديث العدادات في صفحة الأذان إن وجدت
                if (typeof updateAllCountdowns === 'function') {
                    updateAllCountdowns();
                }
            }
        })
        .catch(error => {
            console.log('فشل تحديث المواقيت من الإنترنت، سيتم استخدام التوقيت المخزن');
            // ✅ في حالة الفشل النهائي، نجدول بالبيانات المخزنة كحل أخير
            const savedData = localStorage.getItem('prayerTimesData');
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    if (parsed.timings) displayPrayerTimes(parsed.timings, true);
                } catch(e) {}
            }
        });
}

// دالة عرض المواقيت على الواجهة
function displayPrayerTimes(t, shouldScheduleAndroid = true) {
    const loadingEl = document.getElementById('prayerTimesLoading');
    const gridEl = document.getElementById('prayerTimesGrid');

    if (loadingEl) loadingEl.style.display = 'none';
    if (gridEl) gridEl.style.display = 'grid';

    // دالة مساعدة لتحديث الوقت
    const setTime = (id, value) => {
        const el = document.getElementById(id);
        if (el) el.innerText = convertTo12Hour(value);
    };

    setTime('fajrTime', t.Fajr);
    setTime('sunriseTime', t.Sunrise);
    setTime('dhuhrTime', t.Dhuhr);
    setTime('asrTime', t.Asr);
    setTime('maghribTime', t.Maghrib);
    setTime('ishaTime', t.Isha);

    // حفظ البيانات في متغير عام لتستخدمه دوال أخرى (مثل الأذان)
    window.prayerTimes = t;
    localStorage.setItem('prayerTimes', JSON.stringify(t));

    // 🔗 إرسال المواقيت للنظام الأصلي (Android) - فقط إذا طُلب ذلك (بيانات حديثة)
    if (shouldScheduleAndroid && window.Android && typeof Android.setPrayerTime === 'function') {
        const prayers = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
        prayers.forEach(key => {
            if (t[key]) {
                try {
                    const cleanTime = t[key].split(' ')[0].trim();
                    Android.setPrayerTime(key, cleanTime);

                    // ✅ إرسال صوت المؤذن المخزن لهذه الصلاة أيضاً لضمان مزامنة الجدولة
                    const savedMuadhinKey = localStorage.getItem(`muadhin_${key}`) || 'default';
                    const chosenFileName = MUADHIN_FILES[savedMuadhinKey] || MUADHIN_FILES['default'];
                    Android.setPrayerMuadhin(key, chosenFileName);

                } catch (e) {}
            }
        });
        if (typeof Android.commitPrayerTimes === 'function') {
            try { Android.commitPrayerTimes(); } catch(e) {}
        }
    }
}

window.syncPlayerProgress = function(positionMs, durationMs) {
  const progressBar = document.getElementById('playerProgress');
  const currentTimeTxt = document.getElementById('currentTime');
  const totalTimeTxt = document.getElementById('totalTime');

  if (progressBar && durationMs > 0) {
    progressBar.max = durationMs;
    if (!window.isSeekingProgress) {
      progressBar.value = positionMs;
    }
  }

  if (currentTimeTxt) currentTimeTxt.innerText = formatTime(positionMs / 1000);
  if (totalTimeTxt) totalTimeTxt.innerText = formatTime(durationMs / 1000);
};

function formatTime(seconds) {
  if (isNaN(seconds)) return "0:00";
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

    const surahName = surahNames[index - 1];
    window.currentPlayingIndex = index;
    const nameSpan = document.getElementById('currentSurahName');
    if (nameSpan) nameSpan.innerText = surahName;

    // تحديث شريط التقدم إذا كان مفتوحاً (تصفيره للسورة الجديدة)
    const progressBar = document.getElementById('playerProgress');
    if (progressBar) progressBar.value = 0;
  }
};

function updateMediaSession(surahName, sheikhName) {
    if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
            title: surahName,
            artist: sheikhName,
            album: 'تطبيق منهاج المسلم'
        });

        navigator.mediaSession.setActionHandler('nexttrack', () => playNextSurah());
        navigator.mediaSession.setActionHandler('previoustrack', () => playPrevSurah());

        // للتحكم في الإيقاف والتشغيل من الإشعار
        navigator.mediaSession.setActionHandler('play', () => document.getElementById('audioPlayer').play());
        navigator.mediaSession.setActionHandler('pause', () => document.getElementById('audioPlayer').pause());
    }
}

    window.isVibrationUnlocked = false;

    const disc = document.getElementById('compassDisc');
    if (disc) {
      let discContent = disc.innerHTML;
      const numbers = [0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330];
      numbers.forEach(angle => {
        discContent += `<div class="dial-element dial-number" style="transform: translateX(-50%) rotate(${angle}deg);">${angle}</div>`;
      });
      discContent += `<div class="dial-element dial-letter letter-n" style="transform: translateX(-50%) rotate(0deg);">N</div>`;
      discContent += `<div class="dial-element dial-letter" style="transform: translateX(-50%) rotate(90deg);">E</div>`;
      discContent += `<div class="dial-element dial-letter" style="transform: translateX(-50%) rotate(180deg);">S</div>`;
      discContent += `<div class="dial-element dial-letter" style="transform: translateX(-50%) rotate(270deg);">W</div>`;
      for (let t = 0; t < 360; t += 10) {
        if (t % 30 !== 0) {
          discContent += `<div class="dial-tick" style="transform: translateX(-50%) rotate(${t}deg);"></div>`;
        }
      }
      disc.innerHTML = discContent;
    }

    if (typeof calculateQiblaAngle !== 'function') {
      window.calculateQiblaAngle = function(lat, lon) {
        const kaabaLat = 21.422487, kaabaLon = 39.826206;
        const latRad = lat * (Math.PI / 180), lonRad = lon * (Math.PI / 180);
        const kaabaLatRad = kaabaLat * (Math.PI / 180), kaabaLonRad = kaabaLon * (Math.PI / 180);
        const y = Math.sin(kaabaLonRad - lonRad);
        const x = Math.cos(latRad) * Math.tan(kaabaLatRad) - Math.sin(latRad) * Math.cos(kaabaLonRad - lonRad);
        let qibla = Math.atan2(y, x) * (180 / Math.PI);
        return (qibla + 360) % 360;
      };
    }

    function getDirectionText(heading) {
      const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW', 'N'];
      return directions[Math.round(heading / 45) % 8];
    }

    window.currentTrueQiblaAngle = 135.5;
    activateCompassSensors();

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          window.currentTrueQiblaAngle = calculateQiblaAngle(lat, lon);
          const statusEl = document.getElementById('qiblaStatus');
          if (statusEl) statusEl.innerHTML = `📍 تم تحديد موقعك الدقيق بالـ GPS<br>🎯 اتجاه القبلة هنا: <strong>${Math.round(window.currentTrueQiblaAngle)}°</strong>`;
        },
        (err) => {
          const statusEl = document.getElementById('qiblaStatus');
          if (statusEl) statusEl.innerHTML = '🧭 يعمل بالزاوية الافتراضية للبلاد العربية (يرجى السماح بالـ GPS لدقة محكمة)';
        },
        { enableHighAccuracy: true, timeout: 6000 }
      );
    }

    function activateCompassSensors() {
      if (window.compassHandler) {
        window.removeEventListener('deviceorientationabsolute', window.compassHandler);
        window.removeEventListener('deviceorientation', window.compassHandler);
      }
      let insideCorrectZone = false;

      window.compassHandler = function(event) {
        if (window.location.hash !== '#qibla') { insideCorrectZone = false; return; }
        let heading = null;
        if (event.webkitCompassHeading !== undefined) {
          heading = event.webkitCompassHeading;
        } else if (event.alpha !== null) {
          heading = 360 - event.alpha;
        }

        if (heading !== null) {
          const discEl = document.getElementById('compassDisc');
          if (discEl) discEl.style.transform = `rotate(${-heading}deg)`;
          const kaabaPointer = document.getElementById('kaabaPointer');
          if (kaabaPointer) kaabaPointer.style.transform = `rotate(${window.currentTrueQiblaAngle}deg)`;
          const headingTextEl = document.getElementById('headingAngleText');
          if (headingTextEl) headingTextEl.innerText = `${Math.round(heading)}° ${getDirectionText(heading)}`;

          let diff = Math.abs(heading - window.currentTrueQiblaAngle);
          if (diff > 180) diff = 360 - diff;
          const isAligned = diff <= 5;

          const outerRing = document.getElementById('outerRing');
          const topTriangle = document.getElementById('topTriangle');
          const hintSpan = document.getElementById('compassHint');

          if (isAligned) {
            if (outerRing) outerRing.classList.add('aligned-glow');
            if (topTriangle) topTriangle.classList.add('aligned-arrow');
            if (hintSpan) {
              hintSpan.innerHTML = '✅ اتجاه القبلة صحيح تماماً الآن';
              hintSpan.style.color = '#00ff00';
            }
            if (!insideCorrectZone) {
              if (navigator.vibrate) navigator.vibrate(300);
              insideCorrectZone = true;
            }
          } else {
            if (outerRing) outerRing.classList.remove('aligned-glow');
            if (topTriangle) topTriangle.classList.remove('aligned-arrow');
            if (hintSpan) {
              hintSpan.innerHTML = '🔄 أدر الهاتف ببطء حتى يضيء الإطار بالأخضر';
              hintSpan.style.color = 'inherit';
            }
            insideCorrectZone = false;
          }
        }
      };

      if ('ondeviceorientationabsolute' in window) {
        window.addEventListener('deviceorientationabsolute', window.compassHandler, true);
      } else {
        window.addEventListener('deviceorientation', window.compassHandler, true);
      }
    }
  }

  function toggleTheme() {
    const body = document.body;
    if (!body.classList.contains('dark') && !body.classList.contains('reading')) {
      body.classList.add('dark');
      localStorage.setItem('appTheme', 'dark');
    } else if (body.classList.contains('dark')) {
      body.classList.remove('dark');
      body.classList.add('reading');
      localStorage.setItem('appTheme', 'reading');
    } else {
      body.classList.remove('reading');
      localStorage.setItem('appTheme', 'light');
    }
    const icon = document.querySelector('#headerThemeBtn i');
    if (body.classList.contains('dark')) icon.className = 'fas fa-moon';
    else if (body.classList.contains('reading')) icon.className = 'fas fa-book-open';
    else icon.className = 'fas fa-sun';
  }

  function getTimeRemaining(prayerTime24) {
    if (!prayerTime24) return null;
    const now = new Date();
    const [hours, minutes] = prayerTime24.split(':').map(Number);
    const prayerDate = new Date(now);
    prayerDate.setHours(hours, minutes, 0, 0);

    let diff = prayerDate.getTime() - now.getTime();
    if (diff < 0) {
      prayerDate.setDate(prayerDate.getDate() + 1);
      diff = prayerDate.getTime() - now.getTime();
    }
    return diff;
  }

  /**
   * تنسيق الوقت المتبقي ليظهر بصيغة HH:mm:ss
   */
  function formatCountdown(ms) {
    if (ms <= 0) return '00:00:00';
    const totalSec = Math.floor(ms / 1000);
    const hours = String(Math.floor(totalSec / 3600)).padStart(2, '0');
    const minutes = String(Math.floor((totalSec % 3600) / 60)).padStart(2, '0');
    const seconds = String(totalSec % 60).padStart(2, '0');
    return `${hours}:${minutes}:${seconds}`;
  }

  /**
   * إيقاف الأذان لصلاة معينة
   */
  function stopAthanForPrayer(prayerKey) {
    if (audioPlayers[prayerKey]) {
      try {
        audioPlayers[prayerKey].pause();
        audioPlayers[prayerKey].currentTime = 0;
      } catch(e) {}
      audioPlayers[prayerKey] = null;
    }
    if (currentAthanPrayer === prayerKey) {
      currentAthanPrayer = null;
    }
    const playBtn = document.getElementById(`playBtn_${prayerKey}`);
    if (playBtn) {
      playBtn.classList.remove('playing');
      playBtn.innerHTML = '<i class="fas fa-play"></i>';
    }
    const statusEl = document.getElementById(`status_${prayerKey}`);
    if (statusEl) {
      statusEl.textContent = '⏹ متوقف';
      statusEl.className = 'athan-status-badge status-inactive';
    }
  }

  /**
   * تشغيل الأذان لصلاة معينة
   */
  function playAthanForPrayer(prayerKey) {
    if (currentAthanPrayer && currentAthanPrayer !== prayerKey) {
        stopAthanForPrayer(currentAthanPrayer);
    }

    if (currentAthanPrayer === prayerKey) {
        stopAthanForPrayer(prayerKey);
        return;
    }

    // جلب اختيار المؤذن لهذه الصلاة من localStorage
    const muadhinKey = localStorage.getItem(`muadhin_${prayerKey}`) || 'default';
    let fileName = MUADHIN_FILES[muadhinKey] || MUADHIN_FILES['default'];
    let audioPath = fileName;

    console.log('🔊 تشغيل الأذان:', audioPath, 'لصلاة:', prayerKey);

    const audio = new Audio(audioPath);
    audioPlayers[prayerKey] = audio;

    audio.play()
        .then(() => {
            console.log('✅ تم التشغيل بنجاح');
            currentAthanPrayer = prayerKey;

            const playBtn = document.getElementById(`playBtn_${prayerKey}`);
            if (playBtn) {
                playBtn.classList.add('playing');
                playBtn.innerHTML = '<i class="fas fa-stop"></i>';
            }

            const statusEl = document.getElementById(`status_${prayerKey}`);
            if (statusEl) {
                statusEl.textContent = '🔊 جارٍ التشغيل';
                statusEl.className = 'athan-status-badge status-playing';
            }

            const item = document.getElementById(`athanItem_${prayerKey}`);
            if (item) item.classList.add('athan-active');
        })
        .catch((err) => {
            console.error('❌ خطأ في التشغيل:', err);
            alert(`⚠️ تعذر تشغيل الأذان.\nالملف: ${fileName}\nتأكد من وجود الملف في مجلد athan/`);
            audioPlayers[prayerKey] = null;
        });

    audio.onended = function() {
        if (currentAthanPrayer === prayerKey) {
            stopAthanForPrayer(prayerKey);
            const item = document.getElementById(`athanItem_${prayerKey}`);
            if (item) item.classList.remove('athan-active');
        }
    };
}

  /**
   * تفعيل/إلغاء تفعيل الأذان لصلاة معينة
   */
 function toggleAthanForPrayer(prayerKey) {
    const isActive = athanActive[prayerKey] || false;
    athanActive[prayerKey] = !isActive;

    localStorage.setItem('athanActiveStates', JSON.stringify(athanActive));

    // 🔗 إرسال حالة التفعيل للنظام الأصلي (Android)
    if (window.Android && typeof Android.setPrayerActive === 'function') {
      try {
        Android.setPrayerActive(prayerKey, athanActive[prayerKey]);
      } catch(sendActiveError) {
        console.log('خطأ إرسال حالة التفعيل: ' + sendActiveError);
      }
    }

    const btn = document.getElementById(`toggleAthanBtn_${prayerKey}`);
    if (btn) {
      if (athanActive[prayerKey]) {
        btn.classList.add('active');
        btn.innerHTML = '<i class="fas fa-bell"></i> مفعل';
      } else {
        btn.classList.remove('active');
        btn.innerHTML = '<i class="fas fa-bell-slash"></i> تفعيل';
      }
    }

    const item = document.getElementById(`athanItem_${prayerKey}`);
    if (item) {
      if (athanActive[prayerKey]) {
        item.classList.add('athan-active');
      } else {
        item.classList.remove('athan-active');
      }
    }

    if (athanActive[prayerKey]) {
      startCountdownForPrayer(prayerKey);
    } else {
      if (countdownIntervals[prayerKey]) {
        clearInterval(countdownIntervals[prayerKey]);
        countdownIntervals[prayerKey] = null;
      }
      if (currentAthanPrayer === prayerKey) {
        stopAthanForPrayer(prayerKey);
        const item = document.getElementById(`athanItem_${prayerKey}`);
        if (item) item.classList.remove('athan-active');
      }
    }
  }

  /**
   * بدء العد التنازلي للصلاة
   */
  function startCountdownForPrayer(prayerKey) {
    if (countdownIntervals[prayerKey]) {
      clearInterval(countdownIntervals[prayerKey]);
      countdownIntervals[prayerKey] = null;
    }

    const prayerTimes = getStoredPrayerTimes();
    let prayerTime = null;
    if (prayerTimes) {
      prayerTime = prayerTimes[prayerKey];
    }

    if (!prayerTime) {
      const el = document.getElementById(`countdown_${prayerKey}`);
      if (el) el.textContent = '⏳ لا يوجد توقيت';
      return;
    }

    updateCountdownDisplay(prayerKey, prayerTime);

    countdownIntervals[prayerKey] = setInterval(() => {
      updateCountdownDisplay(prayerKey, prayerTime);
    }, 1000);
  }

  /**
   * تحديث عرض العد التنازلي وتشغيل الأذان تلقائياً وقت الصلاة بدقة
   */
  function updateCountdownDisplay(prayerKey, prayerTime24) {
    const el = document.getElementById(`countdown_${prayerKey}`);
    if (!el) return;

    if (!prayerTime24) {
      el.textContent = '⏳ لا يوجد توقيت';
      return;
    }

    const now = new Date();
    const [hours, minutes] = prayerTime24.split(':').map(Number);

    // جلب الساعة والدقيقة الحالية الحقيقية للجهاز
    const currentHours = now.getHours();
    const currentMinutes = now.getMinutes();

    // 1. الفحص الذكي: إذا حان وقت الصلاة بالدقيقة والساعة الحالية تماماً
    if (currentHours === hours && currentMinutes === minutes) {
        el.textContent = '🕌 الآن';
        return;
    }

    // 2. حساب الوقت المتبقي لعرض العداد في الحالات العادية
    let remaining = getTimeRemaining(prayerTime24);
    if (remaining === null) {
      el.textContent = '⏳ لا يوجد توقيت';
      return;
    }

    const timeStr = formatCountdown(remaining);
    const parts = timeStr.split(':');
    if (parts.length === 3) {
      const hoursPart = parseInt(parts[0]);
      const minutesPart = parseInt(parts[1]);
      const secondsPart = parseInt(parts[2]);

      let display = '';
      if (hoursPart > 0) {
        display += `${hoursPart} <span class="countdown-unit">س</span> `;
      }
      if (hoursPart > 0 || minutesPart > 0) {
        display += `${minutesPart} <span class="countdown-unit">د</span> `;
      }
      display += `${secondsPart} <span class="countdown-unit">ث</span>`;
      el.innerHTML = display;
    } else {
      el.textContent = timeStr;
    }
  }

// ========== دالة إيقاف الأذان من أي مكان ==========
function stopAthanGlobally() {
  try {
    // 1. إيقاف الصوت المشغل
    if (window.currentAthanPlaying) {
      window.currentAthanPlaying.pause();
      window.currentAthanPlaying.currentTime = 0;
      window.currentAthanPlaying = null;
    }

    // 2. إيقاف جميع مشغلات الصوت
    if (typeof audioPlayers === 'object') {
      for (let key in audioPlayers) {
        if (audioPlayers[key]) {
          try {
            audioPlayers[key].pause();
            audioPlayers[key].currentTime = 0;
          } catch(e) {}
          audioPlayers[key] = null;
        }
      }
    }

    // 3. تحديث واجهة المستخدم
    document.querySelectorAll('.athan-play-btn.playing').forEach(btn => {
      btn.classList.remove('playing');
      btn.innerHTML = '<i class="fas fa-play"></i>';
    });

    document.querySelectorAll('.athan-active').forEach(el => {
      el.classList.remove('athan-active');
    });

    // 4. تحديث حالة كل صلاة
    const prayerKeys = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
    prayerKeys.forEach(key => {
      const statusEl = document.getElementById(`status_${key}`);
      if (statusEl) {
        statusEl.textContent = '⏹ متوقف';
        statusEl.className = 'athan-status-badge status-inactive';
      }
      const item = document.getElementById(`athanItem_${key}`);
      if (item) item.classList.remove('athan-active');

      const playBtn = document.getElementById(`playBtn_${key}`);
      if (playBtn) {
        playBtn.classList.remove('playing');
        playBtn.innerHTML = '<i class="fas fa-play"></i>';
      }
    });

    window.currentAthanPlaying = null;
    console.log('🛑 تم إيقاف الأذان');
  } catch(e) {
    console.log('تم إيقاف الأذان');
  }
}

// ========== دالة تشغيل الأذان ==========
function playAthanWithTracking(prayerKey, audioPath) {
  // إيقاف أي أذان سابق
  stopAthanGlobally();

  try {
    const audio = new Audio(audioPath);
    window.currentAthanPlaying = audio;

    // تخزين في المتغير العام
    if (typeof audioPlayers === 'object') {
      audioPlayers[prayerKey] = audio;
    }

    audio.play()
      .then(() => {
        console.log(`✅ تم تشغيل أذان ${PRAYER_NAMES_AR[prayerKey]}`);

        // تحديث واجهة المستخدم
        const playBtn = document.getElementById(`playBtn_${prayerKey}`);
        if (playBtn) {
          playBtn.classList.add('playing');
          playBtn.innerHTML = '<i class="fas fa-stop"></i>';
        }

        const statusEl = document.getElementById(`status_${prayerKey}`);
        if (statusEl) {
          statusEl.textContent = '🔊 جارٍ التشغيل';
          statusEl.className = 'athan-status-badge status-playing';
        }

        const item = document.getElementById(`athanItem_${prayerKey}`);
        if (item) item.classList.add('athan-active');
      })
      .catch(err => {
        console.error('❌ خطأ في تشغيل الأذان:', err);
        window.currentAthanPlaying = null;
      });

    // عند انتهاء الأذان تلقائياً
    audio.onended = function() {
      console.log(`⏹ انتهى أذان ${PRAYER_NAMES_AR[prayerKey]}`);
      stopAthanGlobally();
    };

    audio.onerror = function() {
      console.error('❌ خطأ في ملف الأذان');
      stopAthanGlobally();
    };

  } catch(e) {
    console.error('خطأ في تشغيل الأذان:', e);
    stopAthanGlobally();
  }
}

// ========== دالة إرسال الإشعار الذكي ==========
function sendSmartNotification(prayerKey) {
  if (!('Notification' in window) || Notification.permission !== 'granted') {
    console.log('⚠️ الإشعارات غير مفعلة');
    return;
  }

  const today = new Date().toDateString();
  const notificationKey = `notification_sent_${prayerKey}_${today}`;

  // منع تكرار الإشعار في نفس اليوم
  if (localStorage.getItem(notificationKey) === 'sent') {
    console.log(`ℹ️ إشعار ${PRAYER_NAMES_AR[prayerKey]} تم إرساله مسبقاً اليوم`);
    return;
  }

  const prayerName = PRAYER_NAMES_AR[prayerKey];
  const notificationTitle = `🕌 حان الآن موعد ${prayerName}`;

  const notificationOptions = {
    body: `الله أكبر، الله أكبر.. حان الآن وقت رفع أذان ${prayerName}`,
    icon: 'https://cdn-icons-png.flaticon.com/512/2921/2921769.png',
    dir: 'rtl',
    badge: 'https://cdn-icons-png.flaticon.com/512/2921/2921769.png',
    requireInteraction: true,
    silent: false,
    tag: `athan_${prayerKey}_${today}`,
    data: {
      prayerKey: prayerKey,
      action: 'stop_athan'
    }
  };

  const notification = new Notification(notificationTitle, notificationOptions);

  // ✅ عند الضغط على الإشعار: يوقف الأذان ويفتح التطبيق
  notification.onclick = function(event) {
    event.preventDefault();
    this.close();
    stopAthanGlobally();
    window.focus();
    window.location.hash = '#home';
    if (typeof handleRouting === 'function') {
      handleRouting();
    }
    console.log(`📱 تم الضغط على إشعار ${prayerName} - تم إيقاف الأذان`);
  };

  // ✅ عند إزالة الإشعار (Swipe): يوقف الأذان
  notification.onclose = function() {
    console.log(`❌ تم إزالة إشعار ${prayerName} - إيقاف الأذان`);
    stopAthanGlobally();
  };

  // حفظ أن الإشعار تم إرساله اليوم
  localStorage.setItem(notificationKey, 'sent');
  console.log(`✅ تم إرسال إشعار ${prayerName} (مرة واحدة اليوم)`);
}

// ========== دالة تشغيل الأذان الكاملة ==========
function triggerAthanWithNotification(prayerKey) {
  // 1. التحقق من تفعيل الأذان
  let isActive = true;
  if (typeof athanActive !== 'undefined' && athanActive && athanActive[prayerKey] !== undefined) {
    isActive = athanActive[prayerKey];
  } else {
    const localAct = localStorage.getItem('athanActiveStates');
    if (localAct) {
      try { isActive = JSON.parse(localAct)[prayerKey]; } catch(e){}
    }
  }

  if (!isActive) {
    console.log(`🔇 الأذان لـ ${PRAYER_NAMES_AR[prayerKey]} مغلق`);
    return;
  }

  // 2. منع التكرار في نفس اليوم
  const today = new Date().toDateString();
  const playKey = `athan_played_${prayerKey}_${today}`;
  if (localStorage.getItem(playKey) === 'played') {
    console.log(`⏰ ${PRAYER_NAMES_AR[prayerKey]} تم تشغيلها مسبقاً اليوم`);
    return;
  }

  // 3. جلب مسار ملف الأذان
  const muadhinKey = localStorage.getItem(`muadhin_${prayerKey}`) || 'default';
  let audioPath = (typeof MUADHIN_FILES !== 'undefined') ? MUADHIN_FILES[muadhinKey] : 'athan/default.mp3';

  // 4. تشغيل الأذان
  playAthanWithTracking(prayerKey, audioPath);

  // 5. إرسال الإشعار
  sendSmartNotification(prayerKey);

  // 6. تسجيل التشغيل
  localStorage.setItem(playKey, 'played');

  // 7. إرسال للنظام الأصلي (Android)
  if (window.Android && typeof Android.playAzan === 'function') {
    try {
      Android.playAzan(PRAYER_NAMES_AR[prayerKey]);
    } catch(e) {}
  }
}

// ========== المحرك // ========== المحرك الرئيسي معطل (النظام الأصلي Android هو المسؤول الوحيد عن الجدولة) ==========

// ========== جعل الدوال عامة ==========
window.stopAthanGlobally = stopAthanGlobally;
window.triggerAthanWithNotification = triggerAthanWithNotification;
window.playAthanWithTracking = playAthanWithTracking;
window.sendSmartNotification = sendSmartNotification;

// إيقاف أي أذان عند تحميل الصفحة
document.addEventListener('DOMContentLoaded', function() {
  stopAthanGlobally();
});

  if (!checkExistingUser()) {
    handleRouting();
  }

  // تحديث العدادات كل ثانية لضمان الدقة وتجربة مستخدم سلسة
  setInterval(() => {
    updateAllCountdowns();
  }, 1000);

</script>
